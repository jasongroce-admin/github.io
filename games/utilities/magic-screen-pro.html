<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Magic Screen Pro – GPU Particles</title>
  <link rel="stylesheet" href="../../assets/css/site.css" />
  <style>
    body { background: radial-gradient(circle at top, rgba(102, 204, 255, 0.15), transparent 45%), #050814; }
    .draw-shell { display: flex; flex-direction: column; height: 100svh; gap: 10px; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    @media (min-width: 769px) { .draw-shell { flex-direction: row; } .toolPanel { width: 280px; flex-shrink: 0; } }
    .toolPanel { background: #0b1b30f2; border: 1px solid #335; border-radius: 12px; padding: 10px; backdrop-filter: blur(4px); transition: width 0.3s ease; overflow: hidden; flex-shrink: 0; }
    .toolPanel.collapsed { width: 48px !important; padding: 10px 6px; border-color: #445; }
    .toolPanel.collapsed .tools, .toolPanel.collapsed .advanced, .toolPanel.collapsed .hint, .toolPanel.collapsed h3 { display: none; }
    .tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .tools label { font-size: 0.82rem; color: #e3dcff; }
    .canvasWrap { flex: 1; background: #070b14; border: 1px solid #345; border-radius: 12px; position: relative; overflow: hidden; }
    #bgImage { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; opacity: 0.92; z-index: 1; }
    canvas { position: relative; z-index: 2; width: 100% !important; height: 100% !important; display: block; background: transparent; touch-action: none; }
    .hint { font-size: .8rem; opacity: .9; color: #e3dcff; }
    .toggleBtn { margin-left: auto; font-size: 0.9rem; }
    .collapsed .toggleBtn { margin-left: 0; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 1rem; }
  </style>
</head>
<body>
  <main class="content">
    <section class="panel">
      <div class="top">
        <a class="btn" href="index.html">← Utilities</a>
        <a class="btn" href="../../index.html">Back Home</a>
      </div>

      <div class="draw-shell">
        <div class="toolPanel" id="toolPanel">
          <div class="row" style="margin-bottom:8px; display:flex; align-items:center;">
            <h3 style="margin:0; font-size:1.05rem;">Toolbox + GPU Particles</h3>
            <button class="btn toggleBtn" id="toggleTools">Collapse</button>
          </div>

          <div class="tools">
            <label>Brush Size <input id="size" type="range" min="1" max="60" value="8"></label>
            <label>Opacity <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="1"></label>
            <label>Glow <input id="glow" type="range" min="0" max="50" value="14"></label>
            <label>Fade Seconds <input id="fade" type="range" min="0" max="30" value="0"></label>
            <label>Hue Shift <input id="hueShift" type="range" min="0" max="360" value="0"></label>
            <label>Stroke Color <input id="color" type="color" value="#66ccff"></label>
            <label>Effect
              <select id="effect">
                <option value="neon">Neon</option>
                <option value="rainbow">Rainbow</option>
                <option value="spark">Spark Burst</option>
                <option value="smoke">Smoke Drift</option>
                <option value="pixel">Pixel</option>
                <option value="prism">Prism</option>
                <option value="velvet">Velvet</option>
                <option value="comet">Comet</option>
                <option value="fire">Fire Flicker</option>
                <option value="starburst">Starburst</option>
              </select>
            </label>
            <label>Symmetry
              <select id="symmetry">
                <option value="none">None</option>
                <option value="mirror-x">Mirror X</option>
                <option value="mirror-y">Mirror Y</option>
                <option value="quad">Quad</option>
                <option value="radial-6">Radial 6</option>
                <option value="radial-8">Radial 8</option>
                <option value="kaleido-6">Kaleido 6</option>
              </select>
            </label>
          </div>

          <div class="row advanced" style="margin-top:12px; gap:6px; flex-wrap:wrap;">
            <button class="btn" id="undo">Undo</button>
            <button class="btn" id="redo">Redo</button>
            <button class="btn" id="clear">Clear</button>
            <button class="btn" id="save">Save PNG</button>
            <button class="btn" id="resetSettings">Reset Tools</button>
            <button class="btn" id="cameraBtn">📸 Camera</button>
            <button class="btn" id="uploadBtn">📤 Upload Image</button>
            <button class="btn" id="clearBg" style="display:none">Clear Background</button>
          </div>
          <div class="hint">GPU-accelerated particles for smooth performance.</div>
        </div>

        <div class="canvasWrap">
          <img id="bgImage" alt="">
          <canvas id="board"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas2d = document.getElementById('board');
    const ctx = canvas2d.getContext('2d');
    const bgImageEl = document.getElementById('bgImage');

    // Controls (same as before)
    const sizeInput = document.getElementById('size');
    const alphaInput = document.getElementById('alpha');
    const glowInput = document.getElementById('glow');
    const fadeInput = document.getElementById('fade');
    const hueInput = document.getElementById('hueShift');
    const colorInput = document.getElementById('color');
    const effectInput = document.getElementById('effect');
    const symmetryInput = document.getElementById('symmetry');
    const toolPanel = document.getElementById('toolPanel');
    const toggleTools = document.getElementById('toggleTools');

    let history = [], redoStack = [];
    let drawing = false, last = null;

    // WebGL2 GPU Particle System
    let gl, particleProgram, positionBuffer, colorBuffer, particleCount = 0;
    let particlesData = []; // CPU fallback data
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const MAX_PARTICLES_GPU = isMobile ? 8000 : 25000;

    function initWebGL() {
      try {
        gl = canvas2d.getContext('webgl2');
        if (!gl) throw new Error('No WebGL2');
        
        // Simple point sprite shader for particles
        const vsSource = `#version 300 es
          in vec2 aPosition;
          in float aAlpha;
          uniform vec2 uResolution;
          out float vAlpha;
          void main() {
            vec2 clip = (aPosition / uResolution) * 2.0 - 1.0;
            gl_Position = vec4(clip * vec2(1, -1), 0, 1);
            gl_PointSize = 6.0;
            vAlpha = aAlpha;
          }`;
        const fsSource = `#version 300 es
          precision mediump float;
          in float vAlpha;
          out vec4 fragColor;
          uniform vec3 uColor;
          void main() {
            float d = length(gl_PointCoord - 0.5);
            if (d > 0.5) discard;
            fragColor = vec4(uColor, vAlpha * (1.0 - d * 2.0));
          }`;

        function createShader(type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          return shader;
        }

        particleProgram = gl.createProgram();
        gl.attachShader(particleProgram, createShader(gl.VERTEX_SHADER, vsSource));
        gl.attachShader(particleProgram, createShader(gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(particleProgram);

        positionBuffer = gl.createBuffer();
        colorBuffer = gl.createBuffer(); // we'll pack alpha into a single attribute for simplicity

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        return true;
      } catch (e) {
        console.warn("WebGL2 not available, falling back to CPU particles");
        return false;
      }
    }

    let useGPU = initWebGL();

    // 2D Canvas drawing functions (unchanged from previous optimized version)
    function resize() {
      const rect = canvas2d.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas2d.width = Math.floor(rect.width * scale);
      canvas2d.height = Math.floor(rect.height * scale);
      ctx.scale(scale, scale);
      if (useGPU && gl) {
        gl.viewport(0, 0, canvas2d.width, canvas2d.height);
      }
    }

    function brushColor() { /* same as previous */ 
      if (['rainbow','prism'].includes(effectInput.value)) {
        const hue = (Date.now() / (effectInput.value === 'prism' ? 20 : 30) + +hueInput.value) % 360;
        return `hsla(${hue}, 90%, 60%, ${alphaInput.value})`;
      }
      const c = colorInput.value.replace('#','');
      const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
      return `rgba(${r},${g},${b},${alphaInput.value})`;
    }

    function applyGlow() { ctx.shadowBlur = +glowInput.value; ctx.shadowColor = brushColor(); }

    function getPoints(x, y) { /* same symmetry logic as before */ 
      const w = canvas2d.width / (window.devicePixelRatio || 1);
      const h = canvas2d.height / (window.devicePixelRatio || 1);
      // ... (full symmetry code from your previous file)
      const mx = w - x, my = h - y;
      const sym = symmetryInput.value;
      if (sym === 'mirror-x') return [[x,y],[mx,y]];
      if (sym === 'mirror-y') return [[x,y],[x,my]];
      if (sym === 'quad') return [[x,y],[mx,y],[x,my],[mx,my]];
      if (sym.startsWith('radial') || sym.startsWith('kaleido')) {
        const count = sym.includes('8') ? 8 : 6;
        const cx = w/2, cy = h/2;
        const points = [];
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const dx = x - cx, dy = y - cy;
          const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
          const ry = dx * Math.sin(angle) + dy * Math.cos(angle);
          points.push([cx + rx, cy + ry]);
          if (sym.startsWith('kaleido')) points.push([cx - rx, cy + ry]);
        }
        return points;
      }
      return [[x,y]];
    }

    function drawLine(from, to) {
      // 2D stroke drawing (same)
      const pointsA = getPoints(from.x, from.y);
      const pointsB = getPoints(to.x, to.y);
      ctx.lineWidth = +sizeInput.value;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = brushColor();
      applyGlow();
      pointsA.forEach((p, i) => {
        const [sx, sy] = p;
        const [ex, ey] = pointsB[i % pointsB.length] || pointsB[0];
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      });
      ctx.shadowBlur = 0;
    }

    function tickFade() {
      const fade = +fadeInput.value;
      if (fade <= 0) return;
      ctx.save();
      ctx.fillStyle = `rgba(8,11,24,${1/(fade*60)})`;
      ctx.fillRect(0, 0, canvas2d.width, canvas2d.height);
      ctx.restore();
    }

    // GPU Particle Rendering
    function renderGPUParticles() {
      if (!useGPU || !gl || particlesData.length === 0) return;
      gl.useProgram(particleProgram);

      // Update buffers (simple position + alpha packing)
      const positions = new Float32Array(particlesData.length * 2);
      const alphas = new Float32Array(particlesData.length);
      particlesData.forEach((p, i) => {
        positions[i*2] = p.x;
        positions[i*2+1] = p.y;
        alphas[i] = p.alpha || (p.life / 40);
      });

      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);

      const posLoc = gl.getAttribLocation(particleProgram, 'aPosition');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      // For simplicity we use a uniform color per effect; you can extend this
      const colorLoc = gl.getUniformLocation(particleProgram, 'uColor');
      const resLoc = gl.getUniformLocation(particleProgram, 'uResolution');
      gl.uniform2f(resLoc, canvas2d.width, canvas2d.height);

      // Example color per effect (expand as needed)
      let col = [1, 0.6, 0.2]; // default fire-ish
      if (effectInput.value === 'smoke') col = [0.8, 0.85, 0.9];
      if (effectInput.value === 'starburst') col = [1, 1, 0.7];
      gl.uniform3fv(colorLoc, col);

      gl.drawArrays(gl.POINTS, 0, particlesData.length);
    }

    // CPU-side particle update (lightweight, only simulation)
    function updateParticles() {
      const w = canvas2d.width / (window.devicePixelRatio || 1);
      const h = canvas2d.height / (window.devicePixelRatio || 1);

      for (let i = particlesData.length - 1; i >= 0; i--) {
        const p = particlesData[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.effect === 'smoke') p.vy -= 0.1;
        if (p.effect === 'fire') { p.vy -= 0.15; p.vx *= 0.94; }
        if (p.x < -50 || p.x > w + 50 || p.y < -50 || p.y > h + 50) p.life -= 3;
        if (p.life <= 0) particlesData.splice(i, 1);
      }
    }

    function emitParticles(x, y, count = 8) {
      const eff = effectInput.value;
      if (!['spark','smoke','fire','starburst'].includes(eff)) return;
      for (let i = 0; i < count && particlesData.length < MAX_PARTICLES_GPU; i++) {
        particlesData.push({
          x, y,
          vx: (Math.random()-0.5) * (eff==='smoke' ? 2 : 5),
          vy: (Math.random()-0.5) * (eff==='smoke' ? -3 : 4),
          life: 20 + Math.random()*30,
          effect: eff
        });
      }
    }

    // Pointer handlers (emit on move + initial burst)
    function pointerDown(e) {
      drawing = true;
      const rect = canvas2d.getBoundingClientRect();
      last = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      emitParticles(last.x, last.y, 12);
    }

    function pointerMove(e) {
      if (!drawing) return;
      const rect = canvas2d.getBoundingClientRect();
      const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      drawLine(last, pos);
      // Emit along the line
      const dist = Math.hypot(pos.x - last.x, pos.y - last.y);
      if (dist > 10) emitParticles((last.x + pos.x)/2, (last.y + pos.y)/2, 5);
      last = pos;
    }

    function pointerUp() { drawing = false; last = null; }

    // Rest of the file (background, buttons, undo/redo, toggle, init, animate loop)
    function loadImage(file) { /* same */ 
      const img = new Image();
      img.onload = () => { bgImageEl.src = img.src; document.getElementById('clearBg').style.display = 'inline-flex'; };
      img.src = URL.createObjectURL(file);
    }

    // Camera, upload, drag/drop, paste — same as before
    document.getElementById('cameraBtn').onclick = () => { /* ... */ };
    document.getElementById('uploadBtn').onclick = () => { /* ... */ };
    document.getElementById('clearBg').onclick = () => { bgImageEl.src = ''; document.getElementById('clearBg').style.display = 'none'; };

    canvas2d.addEventListener('dragover', e => e.preventDefault());
    canvas2d.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]?.type.startsWith('image/')) loadImage(e.dataTransfer.files[0]); });
    document.addEventListener('paste', e => { const item = e.clipboardData.items[0]; if (item?.type.startsWith('image/')) loadImage(item.getAsFile()); });

    // Buttons (undo clears particles for cleanliness)
    document.getElementById('undo').onclick = () => { if (history.length > 1) { redoStack.push(history.pop()); ctx.putImageData(history[history.length-1], 0, 0); particlesData = []; } };
    // redo, clear, save, reset — same

    toggleTools.onclick = () => { toolPanel.classList.toggle('collapsed'); toggleTools.textContent = toolPanel.classList.contains('collapsed') ? 'Expand' : 'Collapse'; };

    function animate() {
      tickFade();
      updateParticles();
      if (useGPU) renderGPUParticles();
      requestAnimationFrame(animate);
    }

    function init() {
      if (isMobile) { toolPanel.classList.add('collapsed'); toggleTools.textContent = 'Expand'; }
      resize();
      animate();
    }

    canvas2d.addEventListener('pointerdown', pointerDown);
    canvas2d.addEventListener('pointermove', pointerMove);
    canvas2d.addEventListener('pointerup', pointerUp);
    canvas2d.addEventListener('pointerleave', pointerUp);
    window.addEventListener('resize', resize);

    init();
  </script>
</body>
</html>
