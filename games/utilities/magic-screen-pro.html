<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Magic Screen – Mobile Friendly</title>
  <link rel="stylesheet" href="../../assets/css/site.css" />
  <style>
    body { background: radial-gradient(circle at top, rgba(102, 204, 255, 0.15), transparent 45%), #050814; }
    .draw-shell { 
      display: flex; 
      flex-direction: column; 
      height: 100svh; 
      gap: 10px; 
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    @media (min-width: 769px) {
      .draw-shell { flex-direction: row; }
      .toolPanel { width: 280px; }
    }
    .toolPanel {
      background: #0b1b30f2;
      border: 1px solid #335;
      border-radius: 12px;
      padding: 10px;
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .toolPanel.collapsed { width: 0; padding: 0; border: 0; }
    .tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .tools label { font-size: 0.82rem; color: #e3dcff; }
    .canvasWrap {
      flex: 1;
      background: #070b14;
      border: 1px solid #345;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    #bgImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      opacity: 0.92;
      z-index: 1;
    }
    canvas {
      position: relative;
      z-index: 2;
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: transparent;
      touch-action: none;
    }
    .hint { font-size: .8rem; opacity: .9; color: #e3dcff; }
    .toggleBtn { margin-left: auto; }
  </style>
</head>
<body>
  <main class="content">
    <section class="panel">
      <div class="top">
        <a class="btn" href="index.html">← Utilities</a>
        <a class="btn" href="../../index.html">Back Home</a>
      </div>

      <div class="draw-shell">
        <div class="toolPanel" id="toolPanel">
          <div class="row" style="margin-bottom:8px">
            <h3>Toolbox</h3>
            <button class="btn toggleBtn" id="toggleTools">Collapse</button>
          </div>

          <div class="tools">
            <label>Brush Size <input id="size" type="range" min="1" max="60" value="8"></label>
            <label>Opacity <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="1"></label>
            <label>Glow <input id="glow" type="range" min="0" max="50" value="14"></label>
            <label>Fade Seconds (0 = stay) <input id="fade" type="range" min="0" max="30" value="0"></label>
            <label>Hue Shift <input id="hueShift" type="range" min="0" max="360" value="0"></label>
            <label>Stroke Color <input id="color" type="color" value="#66ccff"></label>
            <label>Effect
              <select id="effect">
                <option value="neon">Neon</option>
                <option value="rainbow">Rainbow</option>
                <option value="spark">Spark</option>
                <option value="smoke">Smoke</option>
                <option value="pixel">Pixel</option>
                <option value="prism">Prism</option>
                <option value="velvet">Velvet</option>
                <option value="comet">Comet</option>
              </select>
            </label>
            <label>Symmetry
              <select id="symmetry">
                <option value="none">None</option>
                <option value="mirror-x">Mirror X</option>
                <option value="mirror-y">Mirror Y</option>
                <option value="quad">Quad</option>
                <option value="radial-6">Radial 6</option>
                <option value="radial-8">Radial 8</option>
                <option value="kaleido-6">Kaleido 6</option>
              </select>
            </label>
          </div>

          <div class="row advanced" style="margin-top:12px; gap:6px; flex-wrap:wrap;">
            <button class="btn" id="undo">Undo</button>
            <button class="btn" id="redo">Redo</button>
            <button class="btn" id="clear">Clear</button>
            <button class="btn" id="save">Save PNG</button>
            <button class="btn" id="resetSettings">Reset Tools</button>
            <button class="btn" id="cameraBtn">📸 Camera</button>
            <button class="btn" id="uploadBtn">📤 Upload Image</button>
            <button class="btn" id="clearBg" style="display:none">Clear Background</button>
          </div>
          <div class="hint">Draw with finger/stylus. Settings saved automatically.</div>
        </div>

        <div class="canvasWrap">
          <img id="bgImage" alt="">
          <canvas id="board"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const bgImageEl = document.getElementById('bgImage');
    let backgroundImage = null;

    // inputs
    const sizeInput = document.getElementById('size');
    const alphaInput = document.getElementById('alpha');
    const glowInput = document.getElementById('glow');
    const fadeInput = document.getElementById('fade');
    const hueInput = document.getElementById('hueShift');
    const colorInput = document.getElementById('color');
    const effectInput = document.getElementById('effect');
    const symmetryInput = document.getElementById('symmetry');
    const toolPanel = document.getElementById('toolPanel');
    const toggleTools = document.getElementById('toggleTools');

    let history = [];
    let redoStack = [];
    let drawing = false;
    let last = null;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * scale);
      canvas.height = Math.floor(rect.height * scale);
      ctx.scale(scale, scale);
    }

    function saveState() {
      history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (history.length > 25) history.shift();
      redoStack = [];
    }

    function brushColor() {
      if (effectInput.value === 'rainbow' || effectInput.value === 'prism') {
        const hue = (Date.now() / (effectInput.value === 'prism' ? 20 : 30) + +hueInput.value) % 360;
        return `hsla(${hue}, 90%, 60%, ${alphaInput.value})`;
      }
      const c = colorInput.value.replace('#','');
      const r = parseInt(c.substr(0,2),16);
      const g = parseInt(c.substr(2,2),16);
      const b = parseInt(c.substr(4,2),16);
      return `rgba(${r},${g},${b},${alphaInput.value})`;
    }

    function applyGlow() {
      ctx.shadowBlur = +glowInput.value;
      ctx.shadowColor = brushColor();
    }

    function getPoints(x, y) {
      // same symmetry code as original – kept unchanged
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      const mx = w - x, my = h - y;
      const sym = symmetryInput.value;
      if (sym === 'mirror-x') return [[x,y],[mx,y]];
      if (sym === 'mirror-y') return [[x,y],[x,my]];
      if (sym === 'quad') return [[x,y],[mx,y],[x,my],[mx,my]];
      if (sym.startsWith('radial') || sym.startsWith('kaleido')) {
        const count = sym.includes('8') ? 8 : 6;
        const cx = w/2, cy = h/2;
        const points = [];
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const dx = x - cx, dy = y - cy;
          const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
          const ry = dx * Math.sin(angle) + dy * Math.cos(angle);
          points.push([cx + rx, cy + ry]);
          if (sym.startsWith('kaleido')) points.push([cx - rx, cy + ry]);
        }
        return points;
      }
      return [[x,y]];
    }

    function drawLine(from, to) {
      const pointsA = getPoints(from.x, from.y);
      const pointsB = getPoints(to.x, to.y);
      ctx.lineWidth = +sizeInput.value;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = brushColor();
      applyGlow();
      pointsA.forEach((p, i) => {
        const [sx, sy] = p;
        const [ex, ey] = pointsB[i % pointsB.length] || pointsB[0];
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      });
      ctx.shadowBlur = 0;
    }

    function tickFade() {
      const fade = +fadeInput.value;
      if (fade <= 0) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(8,11,24,${1/(fade*60)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function pointerDown(e) {
      drawing = true;
      const rect = canvas.getBoundingClientRect();
      last = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      saveState();
    }

    function pointerMove(e) {
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      drawLine(last, pos);
      last = pos;
    }

    function pointerUp() {
      drawing = false;
      last = null;
    }

    // Image background handling
    function loadImage(file) {
      const img = new Image();
      img.onload = () => {
        backgroundImage = img;
        bgImageEl.src = img.src;
        document.getElementById('clearBg').style.display = 'inline-flex';
        saveState();
      };
      img.src = URL.createObjectURL(file);
    }

    // Camera / Upload buttons
    document.getElementById('cameraBtn').onclick = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.onchange = e => e.target.files[0] && loadImage(e.target.files[0]);
      input.click();
    };

    document.getElementById('uploadBtn').onclick = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => e.target.files[0] && loadImage(e.target.files[0]);
      input.click();
    };

    document.getElementById('clearBg').onclick = () => {
      bgImageEl.src = '';
      backgroundImage = null;
      document.getElementById('clearBg').style.display = 'none';
    };

    // Drag & drop + paste (Windows Snipping Tool → Ctrl+V)
    canvas.addEventListener('dragover', e => { e.preventDefault(); });
    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) loadImage(file);
    });

    document.addEventListener('paste', e => {
      const item = e.clipboardData.items[0];
      if (item && item.type.startsWith('image/')) {
        loadImage(item.getAsFile());
      }
    });

    // Rest of original functionality (undo/redo/clear/save/etc.)
    document.getElementById('undo').onclick = () => {
      if (history.length <= 1) return;
      redoStack.push(history.pop());
      ctx.putImageData(history[history.length-1], 0, 0);
    };
    document.getElementById('redo').onclick = () => {
      if (!redoStack.length) return;
      const next = redoStack.pop();
      history.push(next);
      ctx.putImageData(next, 0, 0);
    };
    document.getElementById('clear').onclick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      saveState();
    };
    document.getElementById('save').onclick = () => {
      const link = document.createElement('a');
      link.download = 'magic-screen.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    document.getElementById('resetSettings').onclick = () => {
      sizeInput.value = 8; alphaInput.value = 1; glowInput.value = 14;
      fadeInput.value = 0; hueInput.value = 0; colorInput.value = '#66ccff';
      effectInput.value = 'neon'; symmetryInput.value = 'none';
    };
    toggleTools.onclick = () => {
      toolPanel.classList.toggle('collapsed');
      toggleTools.textContent = toolPanel.classList.contains('collapsed') ? 'Expand' : 'Collapse';
    };

    // Auto-collapse on mobile + resize handling
    function initMobile() {
      if (window.innerWidth < 769 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        toolPanel.classList.add('collapsed');
        toggleTools.textContent = 'Expand';
      }
      resize();
      saveState();
    }

    // Main loop
    function animate() {
      tickFade();
      requestAnimationFrame(animate);
    }

    // Event listeners
    canvas.addEventListener('pointerdown', pointerDown);
    canvas.addEventListener('pointermove', pointerMove);
    canvas.addEventListener('pointerup', pointerUp);
    canvas.addEventListener('pointerleave', pointerUp);
    window.addEventListener('resize', () => { resize(); });
    window.addEventListener('orientationchange', () => { setTimeout(resize, 300); });

    // Start
    initMobile();
    animate();
  </script>
</body>
</html>
