<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>✨ Magic Screen PRO ✨</title>
    <style>
        :root { --accent: #66ccff; --panel: #0f1b32; }
        body {
            background: radial-gradient(circle at top, rgba(102,204,255,0.15), transparent 45%), #050814;
            margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; color: #e3dcff;
            touch-action: none;
        }
        .header { 
            background: rgba(11,27,48,0.98); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid #335;
            padding: 8px 12px; 
            display: flex; 
            align-items:center; 
            gap: 8px; 
            flex-wrap: wrap;
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .header h1 { margin:0; font-size:1.35rem; background:linear-gradient(90deg,#66ccff,#ff66cc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .btn { padding:7px 14px; background:#0b1b30; border:1px solid #446; border-radius:8px; color:#e3dcff; cursor:pointer; font-size:0.93rem; transition:all .2s; }
        .btn:hover { background:#112b44; border-color:var(--accent); }
        .main { display:flex; height:calc(100vh - 57px); }
        .sidebar { width:280px; background:#0b1b30f2; border-right:1px solid #335; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        .inspector { width:270px; background:#0b1b30f2; border-left:1px solid #335; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        .panel { background:var(--panel); border:1px solid #335; border-radius:12px; padding:12px; }
        .panel h3 { margin:0 0 10px; font-size:1.05rem; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .panel.collapsed .content { display:none; }
        .control { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .control label { flex:1; font-size:0.93rem; }
        .control input[type="range"] { flex:2; }
        .control input[type="number"] { width:64px; background:#112b44; border:1px solid #446; color:#e3dcff; padding:5px; border-radius:6px; }
        .tools-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(72px,1fr)); gap:8px; }
        .tool-btn { 
            padding:12px 6px; background:#112b44; border:2px solid transparent; border-radius:10px; 
            font-size:0.9rem; color:#ffffff; font-weight:500; text-align:center; min-height:72px; transition:all .2s;
        }
        .tool-btn.active { border-color:#66ccff; background:#1e3a55; box-shadow:0 0 15px rgba(102,204,255,0.6); }
        .canvas-container { flex:1; display:flex; flex-direction:column; background:#070b14; padding:10px; gap:8px; }
        .canvasWrap { flex:1; background:#070b14; border:2px solid #335; border-radius:16px; overflow:hidden; position:relative; box-shadow:0 0 40px rgba(102,204,255,0.2); }
        canvas { width:100%; height:100%; display:block; background:#080b18; touch-action:none; }
        .preview { width:100%; height:120px; background:#112b44; border-radius:10px; border:1px solid #446; overflow:hidden; }
        .hint { font-size:0.82rem; opacity:0.8; text-align:center; }
        .layer-item { 
            display:flex; align-items:center; gap:10px; padding:8px; background:#112b44; border-radius:8px; 
            margin-bottom:6px; font-size:0.93rem; cursor:grab; user-select:none;
        }
        .layer-item:active { cursor:grabbing; }
        .layer-item.active { border:2px solid var(--accent); }
        .copyright {
            position:fixed; bottom:10px; left:14px; font-size:0.72rem; opacity:0.65; color:#a0b0d0; z-index:1000; pointer-events:none;
        }
        .transform-controls {
            position:absolute; background:rgba(15,27,50,0.98); border:2px solid #66ccff; border-radius:12px; 
            padding:12px; display:none; z-index:300; box-shadow:0 0 30px rgba(102,204,255,0.5); gap:8px; flex-wrap:wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Magic Screen PRO ✨</h1>
        <div style="flex:1"></div>
        <button class="btn" id="newBtn">🆕 New</button>
        <button class="btn" id="clearBtn">🗑️ Clear</button>
        <button class="btn" id="undoBtn">↩ Undo</button>
        <button class="btn" id="redoBtn">↪ Redo</button>
        <button class="btn" id="saveBtn">💾 Save</button>
        <button class="btn" id="loadBtn">📂 Load</button>
        <button class="btn" id="uploadBtn">📤 Upload Image</button>
        <button class="btn" id="fullscreenBtn">⛶ Full</button>
    </div>

    <div class="main">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <div class="panel">
                <h3 onclick="this.parentElement.classList.toggle('collapsed')">🖌️ Tools & Tips <span style="margin-left:auto">▼</span></h3>
                <div class="content tools-grid">
                    <button class="tool-btn active" data-tool="brush" data-tip="soft">🖌️ Soft</button>
                    <button class="tool-btn" data-tool="brush" data-tip="hard">🖌️ Hard</button>
                    <button class="tool-btn" data-tool="brush" data-tip="textured">🖌️ Texture</button>
                    <button class="tool-btn" data-tool="brush" data-tip="watercolor">🎨 Water</button>
                    <button class="tool-btn" data-tool="marker" data-tip="round">🖍️ Round</button>
                    <button class="tool-btn" data-tool="marker" data-tip="chisel">🖍️ Chisel</button>
                    <button class="tool-btn" data-tool="marker" data-tip="calligraphy">🖋️ Callig</button>
                    <button class="tool-btn" data-tool="airbrush">🌫️ Air</button>
                    <button class="tool-btn" data-tool="eraser">🧼 Erase</button>
                    <button class="tool-btn" data-tool="select">🔲 Select</button>
                    <button class="tool-btn" data-tool="arrow">➜ Arrow</button>
                </div>
            </div>

            <div class="panel">
                <h3 onclick="this.parentElement.classList.toggle('collapsed')">🎨 Brush Settings <span style="margin-left:auto">▼</span></h3>
                <div class="content">
                    <div class="control"><label>Size</label><input id="size" type="range" min="2" max="240" value="24"><input id="sizeNum" type="number" value="24"></div>
                    <div class="control"><label>Opacity</label><input id="alpha" type="range" min="0.1" max="1" step="0.01" value="0.94"><input id="alphaNum" type="number" value="0.94" step="0.01"></div>
                    <div class="control"><label>Flow</label><input id="flow" type="range" min="0.2" max="1" step="0.05" value="0.96"><input id="flowNum" type="number" value="0.96" step="0.05"></div>
                    <div class="control"><label>Glow</label><input id="glow" type="range" min="0" max="130" value="38"><input id="glowNum" type="number" value="38"></div>
                </div>
            </div>

            <div class="panel">
                <h3 onclick="this.parentElement.classList.toggle('collapsed')">🌈 Effect <span style="margin-left:auto">▼</span></h3>
                <div class="content">
                    <select id="effect" style="width:100%;padding:11px;border-radius:8px;background:#112b44;border:1px solid #446;color:#e3dcff;">
                        <option value="none" selected>None (Plain)</option>
                        <option value="neon">Neon Glow (Original)</option>
                        <option value="rainbow">Rainbow Rope</option>
                        <option value="prism">Prism Split</option>
                        <option value="spark">Spark Burst</option>
                        <option value="fire">Dragon Fire</option>
                        <option value="electric">Electric Arc</option>
                        <option value="velvet">Velvet Ink</option>
                        <option value="comet">Comet Trail</option>
                        <option value="glitter">Glitter Stars</option>
                        <option value="smoke">Fluffy Clouds</option>
                        <option value="galaxy">Cosmic Galaxy</option>
                        <option value="inkbleed">Ink Bleed</option>
                        <option value="laser">Laser Beam</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CANVAS -->
        <div class="canvas-container">
            <div class="canvasWrap" id="canvasWrap">
                <canvas id="board"></canvas>
            </div>
            <div class="hint">Pressure sensitive • Drag to draw • Shift = straight line</div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="inspector">
            <div class="panel">
                <h3>🔮 Preview</h3>
                <div class="preview"><canvas id="preview" width="230" height="110"></canvas></div>
            </div>

            <div class="panel">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <h3 style="margin:0;">📑 Layers</h3>
                    <button id="addLayerBtn" class="btn" style="padding:4px 12px;font-size:0.85rem;">+ Add Layer</button>
                </div>
                <div id="layersList" style="max-height:340px;overflow-y:auto;"></div>
            </div>

            <div id="selectionControls" class="panel" style="display:none;">
                <h3>🔲 Selection</h3>
                <button id="copySelectionBtn" class="btn" style="width:100%;margin-bottom:8px;">📋 Copy Selection</button>
                <button id="pasteBtn" class="btn" style="width:100%;">📌 Paste</button>
            </div>

            <div id="transformControls" class="panel" style="display:none;">
                <h3>✏️ Transform Pasted Item</h3>
                <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
                    <button onclick="movePasted(-25,0)" class="btn">←</button>
                    <button onclick="movePasted(25,0)" class="btn">→</button>
                    <button onclick="movePasted(0,-25)" class="btn">↑</button>
                    <button onclick="movePasted(0,25)" class="btn">↓</button>
                    <button onclick="resizePasted(0.9)" class="btn">Shrink</button>
                    <button onclick="resizePasted(1.1)" class="btn">Grow</button>
                    <button onclick="rotatePasted(-15)" class="btn">↻ Left</button>
                    <button onclick="rotatePasted(15)" class="btn">↻ Right</button>
                    <button onclick="flipHorizontal()" class="btn">↔ Flip H</button>
                    <button onclick="flipVertical()" class="btn">↕ Flip V</button>
                    <button onclick="confirmPaste()" style="background:#22c55e;color:white;width:100%;">✅ Done</button>
                    <button onclick="cancelPaste()" style="background:#ef4444;color:white;width:100%;">❌ Cancel</button>
                </div>
            </div>

            <div class="panel">
                <h3>🌟 Color</h3>
                <div class="control"><label>Base Color</label><input id="color" type="color" value="#66ccff" style="width:62px;height:34px;border:none;cursor:pointer;"></div>
                <div class="control"><label>Hue Shift</label><input id="hueShift" type="range" min="0" max="360" value="0"><input id="hueShiftNum" type="number" value="0"></div>
            </div>

            <div class="panel">
                <h3>✨ Symmetry</h3>
                <select id="symmetry" style="width:100%;padding:10px;border-radius:8px;background:#112b44;border:1px solid #446;color:#e3dcff;">
                    <option value="none">None</option>
                    <option value="mirror-x">Mirror X</option>
                    <option value="mirror-y">Mirror Y</option>
                    <option value="quad">Quad</option>
                    <option value="radial-6">Radial 6</option>
                    <option value="radial-8">Radial 8</option>
                    <option value="kaleido-6">Kaleido 6</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Copyright -->
    <div class="copyright">
        © 2026 Jason Groce. All rights reserved. Use permitted with attribution.
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('preview');
        const pctx = previewCanvas.getContext('2d');
        const canvasWrap = document.getElementById('canvasWrap');

        let layers = [];
        let currentLayerIndex = 0;
        let history = [], redoStack = [];
        let drawing = false;
        let lastPos = null;
        let currentAngle = 0;

        let currentTool = 'brush';
        let currentTip = 'soft';

        let selectionMode = false;
        let selectionStart = null;
        let selectionRect = null;
        let copiedImage = null;

        let pastedImage = null;
        let pastedX = 150, pastedY = 150;
        let pastedRotation = 0;
        let pastedScale = 1;

        let arrowStart = null;

        let settings = {
            size:24, alpha:0.94, flow:0.96, glow:38,
            hueShift:0, color:'#66ccff', effect:'none',
            symmetry:'none', rotSpeed:0, rotOffset:0,
            symCenterX:50, symCenterY:50,
            neonLayers:5
        };

        function createNewLayer(name = "Layer") {
            const c = document.createElement('canvas');
            c.width = canvas.width;
            c.height = canvas.height;
            return { canvas: c, ctx: c.getContext('2d'), name, visible: true, opacity: 1 };
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            layers.forEach(l => {
                const temp = document.createElement('canvas');
                temp.width = l.canvas.width; temp.height = l.canvas.height;
                temp.getContext('2d').drawImage(l.canvas, 0, 0);
                l.canvas.width = canvas.width; l.canvas.height = canvas.height;
                l.ctx.scale(dpr, dpr);
                l.ctx.drawImage(temp, 0, 0);
            });
        }

        function renderAllLayers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            layers.forEach(layer => {
                if (layer.visible) {
                    ctx.globalAlpha = layer.opacity;
                    ctx.drawImage(layer.canvas, 0, 0);
                }
            });
            ctx.globalAlpha = 1;

            if (pastedImage) {
                ctx.save();
                ctx.translate(pastedX + pastedImage.width/2, pastedY + pastedImage.height/2);
                ctx.rotate(pastedRotation * Math.PI / 180);
                ctx.scale(pastedScale, pastedScale);
                ctx.drawImage(pastedImage, -pastedImage.width/2, -pastedImage.height/2);
                ctx.restore();
            }
        }

        function saveState() {
            const state = layers.map(l => {
                const c = document.createElement('canvas');
                c.width = l.canvas.width; c.height = l.canvas.height;
                c.getContext('2d').drawImage(l.canvas, 0, 0);
                return c;
            });
            history.push(state);
            if (history.length > 28) history.shift();
            redoStack = [];
        }

        function undo() {
            if (history.length === 0) return;
            const lastState = history.pop();
            redoStack.push(layers.map(l => {
                const c = document.createElement('canvas');
                c.width = l.canvas.width; c.height = l.canvas.height;
                c.getContext('2d').drawImage(l.canvas, 0, 0);
                return c;
            }));
            layers.forEach((l, i) => {
                l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height);
                l.ctx.drawImage(lastState[i], 0, 0);
            });
            renderAllLayers();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const nextState = redoStack.pop();
            history.push(layers.map(l => {
                const c = document.createElement('canvas');
                c.width = l.canvas.width; c.height = l.canvas.height;
                c.getContext('2d').drawImage(l.canvas, 0, 0);
                return c;
            }));
            layers.forEach((l, i) => {
                l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height);
                l.ctx.drawImage(nextState[i], 0, 0);
            });
            renderAllLayers();
        }

        function getSymmetryPoints(x, y) {
            const w = canvas.getBoundingClientRect().width;
            const h = canvas.getBoundingClientRect().height;
            const cx = w * (settings.symCenterX / 100);
            const cy = h * (settings.symCenterY / 100);
            let pts = [[x, y]];
            const sym = settings.symmetry;
            const rot = (settings.rotOffset + currentAngle) * Math.PI / 180;

            if (sym === 'mirror-x') pts.push([w - x, y]);
            else if (sym === 'mirror-y') pts.push([x, h - y]);
            else if (sym === 'quad') pts.push([w-x,y],[x,h-y],[w-x,h-y]);
            else if (sym.startsWith('radial') || sym.startsWith('kaleido')) {
                const count = sym.includes('8') ? 8 : 6;
                const dx = x - cx, dy = y - cy;
                for (let i = 1; i < count; i++) {
                    const a = (Math.PI * 2 / count) * i + rot;
                    const rx = dx * Math.cos(a) - dy * Math.sin(a);
                    const ry = dx * Math.sin(a) + dy * Math.cos(a);
                    pts.push([cx + rx, cy + ry]);
                    if (sym.startsWith('kaleido')) pts.push([cx - rx, cy + ry]);
                }
            }
            return pts;
        }

        function drawStroke(from, to, pressure = 1) {
            const activeLayer = layers[currentLayerIndex];
            if (!activeLayer) return;
            const layerCtx = activeLayer.ctx;

            const symFrom = getSymmetryPoints(from.x, from.y);
            const symTo = getSymmetryPoints(to.x, to.y);

            let width = settings.size * settings.flow * pressure;

            if (currentTip === 'hard') width *= 0.9;
            if (currentTip === 'textured') width *= 1.22;
            if (currentTip === 'watercolor') width *= 1.42;
            if (currentTip === 'chisel') width *= 1.68;
            if (currentTip === 'calligraphy') width *= 0.68 + Math.abs(Math.sin(Date.now()/130)) * 1.48;
            if (currentTip === 'airbrush') width *= 2.7;

            symFrom.forEach((p1, i) => {
                const p2 = symTo[i % symTo.length];

                layerCtx.lineCap = (currentTip === 'calligraphy') ? 'butt' : 'round';
                layerCtx.lineJoin = 'round';

                const baseColor = settings.color;

                if (settings.effect === 'neon') {
                    for (let l = settings.neonLayers; l >= 0; l--) {
                        layerCtx.shadowBlur = settings.glow + l * 16;
                        layerCtx.globalAlpha = settings.alpha * (1 - l * 0.22);
                        layerCtx.lineWidth = width + l * 2.8;
                        layerCtx.strokeStyle = baseColor;
                        layerCtx.beginPath();
                        layerCtx.moveTo(p1[0], p1[1]);
                        layerCtx.lineTo(p2[0], p2[1]);
                        layerCtx.stroke();
                    }
                } else if (settings.effect === 'rainbow') {
                    const hue = (Date.now() / 18 + settings.hueShift) % 360;
                    layerCtx.strokeStyle = `hsla(${hue + i*28}, 96%, 70%, ${settings.alpha})`;
                    layerCtx.shadowBlur = settings.glow + 14;
                    layerCtx.lineWidth = width;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                } else if (settings.effect === 'spark') {
                    layerCtx.shadowBlur = 18;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                    for (let k = 0; k < 8; k++) {
                        const rx = p1[0] + Math.random() * (p2[0]-p1[0]);
                        const ry = p1[1] + Math.random() * (p2[1]-p1[1]);
                        layerCtx.fillStyle = baseColor;
                        layerCtx.fillRect(rx-3, ry-3, 6, 6);
                    }
                } else if (settings.effect === 'fire') {
                    const hue = parseInt(baseColor.slice(1,3),16) * 0.3 + 10;
                    layerCtx.shadowBlur = settings.glow + 22;
                    layerCtx.strokeStyle = `hsl(${hue}, 100%, 65%)`;
                    layerCtx.lineWidth = width;
                    layerCtx.globalAlpha = settings.alpha;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                } else if (settings.effect === 'electric') {
                    layerCtx.shadowBlur = 50;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width * 0.8;
                    layerCtx.setLineDash([3,12]);
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                    layerCtx.setLineDash([]);
                } else if (settings.effect === 'glitter') {
                    layerCtx.shadowBlur = 22;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                    for (let k = 0; k < 12; k++) {
                        const rx = p1[0] + Math.random() * (p2[0]-p1[0]);
                        const ry = p1[1] + Math.random() * (p2[1]-p1[1]);
                        layerCtx.fillStyle = '#ffffff';
                        layerCtx.fillRect(rx-2, ry-2, 4, 4);
                    }
                } else if (settings.effect === 'smoke') {
                    layerCtx.shadowBlur = 45;
                    layerCtx.globalAlpha = 0.35;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width * 2.4;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                } else if (settings.effect === 'galaxy') {
                    const hue = (Date.now()/35 + settings.hueShift) % 360;
                    layerCtx.strokeStyle = `hsla(${hue},85%,72%,${settings.alpha})`;
                    layerCtx.shadowBlur = settings.glow;
                    layerCtx.lineWidth = width;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                } else if (settings.effect === 'laser') {
                    layerCtx.shadowBlur = 80;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width * 0.4;
                    layerCtx.beginPath(); layerCtx.moveTo(p1[0],p1[1]); layerCtx.lineTo(p2[0],p2[1]); layerCtx.stroke();
                } else {
                    layerCtx.shadowBlur = settings.glow;
                    layerCtx.strokeStyle = baseColor;
                    layerCtx.lineWidth = width;
                    layerCtx.globalAlpha = settings.alpha;
                    layerCtx.beginPath();
                    layerCtx.moveTo(p1[0], p1[1]);
                    layerCtx.lineTo(p2[0], p2[1]);
                    layerCtx.stroke();
                }

                if (currentTip === 'textured') {
                    layerCtx.shadowBlur = 5;
                    for (let n = 0; n < 6; n++) {
                        layerCtx.globalAlpha = 0.25 + Math.random() * 0.4;
                        layerCtx.lineWidth = width * (0.45 + Math.random() * 0.75);
                        layerCtx.beginPath();
                        layerCtx.moveTo(p1[0] + (Math.random()-0.5)*8, p1[1] + (Math.random()-0.5)*8);
                        layerCtx.lineTo(p2[0] + (Math.random()-0.5)*8, p2[1] + (Math.random()-0.5)*8);
                        layerCtx.stroke();
                    }
                }
            });

            renderAllLayers();
        }

        function pointerDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const pressure = e.pressure || 1;

            if (currentTool === 'select') {
                selectionMode = true;
                selectionStart = {x, y};
                selectionRect = null;
                return;
            }

            if (currentTool === 'arrow') {
                arrowStart = {x, y};
                return;
            }

            drawing = true;
            lastPos = {x, y, pressure};
            saveState();
        }

        function pointerMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const pressure = e.pressure || 1;

            if (currentTool === 'select' && selectionMode && selectionStart) {
                selectionRect = {x: Math.min(selectionStart.x, x), y: Math.min(selectionStart.y, y), w: Math.abs(x - selectionStart.x), h: Math.abs(y - selectionStart.y)};
                renderAllLayers();
                ctx.save();
                ctx.setLineDash([4,4]);
                ctx.strokeStyle = '#66ccff';
                ctx.lineWidth = 2;
                ctx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
                ctx.restore();
                return;
            }

            if (currentTool === 'arrow' && arrowStart) {
                renderAllLayers();
                ctx.save();
                ctx.strokeStyle = settings.color;
                ctx.lineWidth = settings.size * settings.flow;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(arrowStart.x, arrowStart.y);
                ctx.lineTo(x, y);
                ctx.stroke();
                const angle = Math.atan2(y - arrowStart.y, x - arrowStart.x);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x - 22*Math.cos(angle - Math.PI/6), y - 22*Math.sin(angle - Math.PI/6));
                ctx.moveTo(x, y);
                ctx.lineTo(x - 22*Math.cos(angle + Math.PI/6), y - 22*Math.sin(angle + Math.PI/6));
                ctx.stroke();
                ctx.restore();
                return;
            }

            if (!drawing || !lastPos) return;

            drawStroke(lastPos, {x, y}, pressure);
            lastPos = {x, y, pressure};
        }

        function pointerUp(e) {
            if (currentTool === 'select' && selectionMode) {
                selectionMode = false;
                if (selectionRect && selectionRect.w > 15 && selectionRect.h > 15) {
                    document.getElementById('selectionControls').style.display = 'block';
                }
                return;
            }

            if (currentTool === 'arrow' && arrowStart) {
                const activeLayer = layers[currentLayerIndex];
                const layerCtx = activeLayer.ctx;
                layerCtx.strokeStyle = settings.color;
                layerCtx.lineWidth = settings.size * settings.flow;
                layerCtx.lineCap = 'round';
                layerCtx.beginPath();
                layerCtx.moveTo(arrowStart.x, arrowStart.y);
                layerCtx.lineTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
                layerCtx.stroke();
                const angle = Math.atan2(
                    e.clientY - canvas.getBoundingClientRect().top - arrowStart.y,
                    e.clientX - canvas.getBoundingClientRect().left - arrowStart.x
                );
                layerCtx.beginPath();
                layerCtx.moveTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
                layerCtx.lineTo(e.clientX - canvas.getBoundingClientRect().left - 22*Math.cos(angle - Math.PI/6), e.clientY - canvas.getBoundingClientRect().top - 22*Math.sin(angle - Math.PI/6));
                layerCtx.moveTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
                layerCtx.lineTo(e.clientX - canvas.getBoundingClientRect().left - 22*Math.cos(angle + Math.PI/6), e.clientY - canvas.getBoundingClientRect().top - 22*Math.sin(angle + Math.PI/6));
                layerCtx.stroke();
                arrowStart = null;
                saveState();
                renderAllLayers();
            }

            drawing = false;
            lastPos = null;
        }

        function copySelection() {
            if (!selectionRect) return;
            const temp = document.createElement('canvas');
            temp.width = selectionRect.w;
            temp.height = selectionRect.h;
            temp.getContext('2d').drawImage(canvas, selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h, 0, 0, selectionRect.w, selectionRect.h);
            copiedImage = temp;
        }

        function pasteSelection() {
            if (!copiedImage) return;
            pastedImage = copiedImage;
            pastedX = 150;
            pastedY = 150;
            pastedRotation = 0;
            pastedScale = 1;
            document.getElementById('transformControls').style.display = 'block';
            document.getElementById('selectionControls').style.display = 'none';
            renderAllLayers();
        }

        function movePasted(dx, dy) {
            pastedX += dx;
            pastedY += dy;
            renderAllLayers();
        }

        function resizePasted(factor) {
            pastedScale *= factor;
            renderAllLayers();
        }

        function rotatePasted(deg) {
            pastedRotation += deg;
            renderAllLayers();
        }

        function flipHorizontal() {
            pastedScale *= -1;
            renderAllLayers();
        }

        function flipVertical() {
            pastedScale *= -1;
            renderAllLayers();
        }

        function confirmPaste() {
            const activeLayer = layers[currentLayerIndex];
            activeLayer.ctx.save();
            activeLayer.ctx.translate(pastedX + pastedImage.width/2, pastedY + pastedImage.height/2);
            activeLayer.ctx.rotate(pastedRotation * Math.PI / 180);
            activeLayer.ctx.scale(pastedScale, pastedScale);
            activeLayer.ctx.drawImage(pastedImage, -pastedImage.width/2, -pastedImage.height/2);
            activeLayer.ctx.restore();
            saveState();
            renderAllLayers();
            cancelPaste();
        }

        function cancelPaste() {
            pastedImage = null;
            document.getElementById('transformControls').style.display = 'none';
            selectionRect = null;
        }

        function renderLayersList() {
            const container = document.getElementById('layersList');
            container.innerHTML = '';
            layers.forEach((layer, i) => {
                const div = document.createElement('div');
                div.className = `layer-item ${i === currentLayerIndex ? 'active' : ''}`;
                div.draggable = true;
                div.innerHTML = `
                    <span onclick="toggleLayerVisibility(${i}); event.stopImmediatePropagation();" style="color:${layer.visible?'#66ccff':'#666'}">👁</span>
                    <span style="flex:1">${layer.name}</span>
                    <input type="range" min="0.1" max="1" step="0.05" value="${layer.opacity}" style="width:70px;" onchange="layers[${i}].opacity = parseFloat(this.value); renderAllLayers();">
                `;
                div.onclick = (e) => { if (e.target.tagName !== 'INPUT') { currentLayerIndex = i; renderLayersList(); } };
                div.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); });
                div.addEventListener('dragover', e => e.preventDefault());
                div.addEventListener('drop', e => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = i;
                    if (fromIndex === toIndex) return;
                    const movedLayer = layers.splice(fromIndex, 1)[0];
                    layers.splice(toIndex, 0, movedLayer);
                    currentLayerIndex = toIndex;
                    renderLayersList();
                    renderAllLayers();
                    saveState();
                });
                container.appendChild(div);
            });
        }

        function toggleLayerVisibility(i) {
            layers[i].visible = !layers[i].visible;
            renderLayersList();
            renderAllLayers();
        }

        function addNewLayer() {
            layers.push(createNewLayer());
            currentLayerIndex = layers.length - 1;
            renderLayersList();
            renderAllLayers();
        }

        function attachUI() {
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTool = btn.dataset.tool;
                    currentTip = btn.dataset.tip || 'soft';
                    document.getElementById('selectionControls').style.display = currentTool === 'select' ? 'block' : 'none';
                });
            });

            const sliderIds = ['size','alpha','flow','glow','hueShift'];
            sliderIds.forEach(id => {
                const s = document.getElementById(id);
                const n = document.getElementById(id + 'Num');
                if (s) s.addEventListener('input', () => {
                    settings[id] = parseFloat(s.value);
                    if (n) n.value = settings[id];
                    if (['glow','size'].includes(id)) updatePreview();
                });
            });

            document.getElementById('color').addEventListener('input', e => { settings.color = e.target.value; updatePreview(); });
            document.getElementById('effect').addEventListener('change', () => { settings.effect = document.getElementById('effect').value; updatePreview(); });

            document.getElementById('addLayerBtn').onclick = addNewLayer;
            document.getElementById('copySelectionBtn').onclick = copySelection;
            document.getElementById('pasteBtn').onclick = pasteSelection;

            document.getElementById('newBtn').onclick = () => {
                if (confirm('Start fresh canvas?')) {
                    layers = [createNewLayer("Background")];
                    currentLayerIndex = 0;
                    history = [];
                    renderLayersList();
                    renderAllLayers();
                    saveState();
                }
            };

            document.getElementById('clearBtn').onclick = () => {
                if (confirm('Clear current layer?')) {
                    layers[currentLayerIndex].ctx.clearRect(0,0,canvas.width,canvas.height);
                    saveState();
                    renderAllLayers();
                }
            };

            document.getElementById('undoBtn').onclick = undo;
            document.getElementById('redoBtn').onclick = redo;

            document.getElementById('saveBtn').onclick = () => {
                const link = document.createElement('a');
                link.download = `magic-pro-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            document.getElementById('loadBtn').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/png';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new Image();
                        img.onload = () => {
                            layers[currentLayerIndex].ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            saveState();
                            renderAllLayers();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            };

            document.getElementById('uploadBtn').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new Image();
                        img.onload = () => {
                            const bgLayer = createNewLayer("Uploaded Image");
                            bgLayer.ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            layers.unshift(bgLayer);
                            currentLayerIndex = layers.length - 1;
                            renderLayersList();
                            renderAllLayers();
                            saveState();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            };

            document.getElementById('fullscreenBtn').onclick = () => {
                if (!document.fullscreenElement) canvasWrap.requestFullscreen();
                else document.exitFullscreen();
            };
        }

        function init() {
            resize();
            window.addEventListener('resize', resize);

            layers = [createNewLayer("Background")];
            currentLayerIndex = 0;

            canvas.addEventListener('pointerdown', pointerDown);
            canvas.addEventListener('pointermove', pointerMove);
            canvas.addEventListener('pointerup', pointerUp);
            canvas.addEventListener('pointerleave', pointerUp);

            attachUI();
            renderLayersList();
            updatePreview();
            saveState();
            renderAllLayers();
            animate();

            console.log('%cMagic Screen PRO – All buttons fixed + layer drag & drop + upload + arrow improvements + color-aware effects', 'color:#66ccff');
        }

        function updatePreview() {
            pctx.fillStyle = '#112b44';
            pctx.fillRect(0,0,previewCanvas.width,previewCanvas.height);

            const cx = previewCanvas.width / 2;
            const cy = previewCanvas.height / 2;

            pctx.shadowBlur = settings.glow;
            pctx.shadowColor = settings.color;
            pctx.lineWidth = settings.size * 1.3;
            pctx.lineCap = 'round';

            if (settings.effect === 'neon') {
                for (let l = 4; l >= 0; l--) {
                    pctx.shadowBlur = settings.glow + l * 14;
                    pctx.globalAlpha = 0.9 - l * 0.22;
                    pctx.strokeStyle = settings.color;
                    pctx.beginPath();
                    pctx.moveTo(cx - 80, cy);
                    pctx.quadraticCurveTo(cx - 25, cy - 35, cx + 80, cy);
                    pctx.stroke();
                }
            } else if (settings.effect === 'rainbow') {
                const hue = (Date.now() / 25) % 360;
                pctx.strokeStyle = `hsla(${hue}, 95%, 68%, 0.95)`;
                pctx.beginPath();
                pctx.moveTo(cx - 80, cy);
                pctx.quadraticCurveTo(cx - 25, cy - 35, cx + 80, cy);
                pctx.stroke();
            } else if (settings.effect === 'fire') {
                pctx.shadowBlur = 30;
                pctx.strokeStyle = settings.color;
                pctx.beginPath();
                pctx.moveTo(cx - 80, cy);
                pctx.quadraticCurveTo(cx - 25, cy - 35, cx + 80, cy);
                pctx.stroke();
            } else if (settings.effect === 'laser') {
                pctx.shadowBlur = 80;
                pctx.strokeStyle = settings.color;
                pctx.lineWidth = settings.size * 0.6;
                pctx.beginPath();
                pctx.moveTo(cx - 80, cy);
                pctx.quadraticCurveTo(cx - 25, cy - 35, cx + 80, cy);
                pctx.stroke();
            } else {
                pctx.strokeStyle = settings.color;
                pctx.beginPath();
                pctx.moveTo(cx - 80, cy);
                pctx.quadraticCurveTo(cx - 25, cy - 35, cx + 80, cy);
                pctx.stroke();
            }
            pctx.globalAlpha = 1;
        }

        function animate() {
            currentAngle += settings.rotSpeed * 0.7;
            requestAnimationFrame(animate);
        }

        init();
    </script>
  </body>
</html>
