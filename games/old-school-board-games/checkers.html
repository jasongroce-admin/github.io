<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Checkers</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.b{display:grid;grid-template-columns:repeat(8,44px);gap:2px}.c{width:44px;height:44px}.d{background:#9ca3af}.p{width:30px;height:30px;border-radius:50%;margin:auto}.r{background:#ef4444}.k{background:#111}</style></head><body><main class='content'><section class='panel'><h1>Checkers</h1><div id='how' class='card'><p>Tap piece then destination diagonal. Jump captures enabled.</p><button id='close'>Start</button></div><div id='b' class='b'></div><div id='s' class='card'>Red turn.</div><a class='card' href='index.html'><h3>Back to Board Games</h3></a></section></main><script>close.onclick=()=>how.style.display='none';let B=Array.from({length:8},(_,r)=>Array.from({length:8},(_,c)=>((r+c)%2?(r<3?'b':r>4?'r':'') : ''))),sel=null,t='r';function render(){b.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('button');d.className='c '+((r+c)%2?'d':'');d.onclick=()=>tap(r,c);if(B[r][c]){const p=document.createElement('div');p.className='p '+(B[r][c]==='r'?'r':'k');d.appendChild(p);}b.appendChild(d);}}function tap(r,c){if(!sel){if(B[r][c]===t)sel=[r,c];return;}const[sr,sc]=sel,dr=r-sr,dc=c-sc;if(!B[r][c]&&Math.abs(dc)===Math.abs(dr)&&(Math.abs(dr)===1||Math.abs(dr)===2)){if(Math.abs(dr)===2){const mr=(sr+r)/2,mc=(sc+c)/2;if(!B[mr][mc]||B[mr][mc]===t){sel=null;return;}B[mr][mc]='';}B[r][c]=B[sr][sc];B[sr][sc]='';t=t==='r'?'b':'r';s.textContent=(t==='r'?'Red':'Black')+' turn.';}sel=null;render();}render();</script></body></html>
