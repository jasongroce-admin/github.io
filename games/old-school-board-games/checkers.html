<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Checkers</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.b{display:grid;grid-template-columns:repeat(8,min(11vw,64px));gap:3px;justify-content:center}.c{width:min(11vw,64px);height:min(11vw,64px);border:0;border-radius:10px;background:#d9b98f}.d{background:radial-gradient(circle at 40% 30%,#754c24,#3b2212)}.p{width:72%;height:72%;border-radius:50%;margin:auto;box-shadow:inset 0 0 10px #fff4}.r{background:radial-gradient(circle at 40% 30%,#ff8f8f,#d11f1f)}.k{background:radial-gradient(circle at 40% 30%,#999,#141414)}.sel{outline:3px solid #7cf3ff}.hint{box-shadow:inset 0 0 0 4px #67ff9a}</style></head><body><main class='content'><section class='panel'><h1>Checkers Deluxe</h1><div id='how' class='card'><p>Improved board texture + CPU opponent (Black). Select your red checker and highlighted diagonals show available moves.</p><button id='close'>Start</button></div><div style='display:flex;gap:8px;flex-wrap:wrap;margin:8px 0'><button class='btn' id='reset'>Reset</button></div><div id='b' class='b'></div><div id='s' class='card'>Red turn.</div><a class='btn' href='index.html'>Back to Board Games</a></section></main><script>close.onclick=()=>how.style.display='none';let B,sel=null,t='r';const king=p=>p==='R'||p==='B',owner=p=>p.toLowerCase();function init(){B=Array.from({length:8},(_,r)=>Array.from({length:8},(_,c)=>((r+c)%2?(r<3?'b':r>4?'r':'') : '')));sel=null;t='r';s.textContent='Red turn.';render()}reset.onclick=init;function dirs(p){if(p==='r')return [[-1,-1],[-1,1]];if(p==='b')return [[1,-1],[1,1]];if(p==='R'||p==='B')return [[-1,-1],[-1,1],[1,-1],[1,1]];return []}
function moves(r,c){const p=B[r][c];if(!p)return[];const out=[];for(const[d1,d2] of dirs(p)){const r1=r+d1,c1=c+d2,r2=r+d1*2,c2=c+d2*2;if(r1>=0&&r1<8&&c1>=0&&c1<8&&!B[r1][c1])out.push([r1,c1,false]);if(r2>=0&&r2<8&&c2>=0&&c2<8&&B[r1][c1]&&owner(B[r1][c1])!==owner(p)&&!B[r2][c2])out.push([r2,c2,true]);}return out;}
function allMoves(side){const out=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(owner(B[r][c]||'')===side)for(const m of moves(r,c))out.push([r,c,...m]);return out;}
function promote(r,c){if(B[r][c]==='r'&&r===0)B[r][c]='R';if(B[r][c]==='b'&&r===7)B[r][c]='B';}
function cpu(){const m=allMoves('b');if(!m.length){s.textContent='You win!';return;}const pick=m[Math.floor(Math.random()*m.length)];playMove(...pick);t='r';s.textContent='Red turn.';render();}
function playMove(sr,sc,tr,tc,jump){const p=B[sr][sc];B[sr][sc]='';B[tr][tc]=p;if(jump){B[(sr+tr)/2][(sc+tc)/2]='';}promote(tr,tc);}
function tap(r,c){if(t!=='r')return;if(!sel){if(owner(B[r][c]||'')==='r'){sel=[r,c];render();}return;}const[sr,sc]=sel;const mv=moves(sr,sc).find(m=>m[0]===r&&m[1]===c);if(mv){playMove(sr,sc,r,c,mv[2]);sel=null;t='b';render();setTimeout(cpu,280);return;}sel=owner(B[r][c]||'')==='r'?[r,c]:null;render();}
function render(){b.innerHTML='';const hs=sel?moves(sel[0],sel[1]):[];for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('button');d.className='c '+((r+c)%2?'d':'');if(sel&&sel[0]===r&&sel[1]===c)d.classList.add('sel');if(hs.some(m=>m[0]===r&&m[1]===c))d.classList.add('hint');d.onclick=()=>tap(r,c);if(B[r][c]){const p=document.createElement('div');p.className='p '+(owner(B[r][c])==='r'?'r':'k');if(king(B[r][c]))p.textContent='♛';d.appendChild(p);}b.appendChild(d);}}
init();</script></body></html>
