<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Old School Board Games</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.tabs{display:flex;gap:8px;flex-wrap:wrap}.board{display:grid;gap:2px;background:#1f2937;padding:6px;border-radius:8px}.cell{width:34px;height:34px;background:#e5e7eb;display:grid;place-items:center;font-weight:700;touch-action:manipulation}.dark{background:#9ca3af}.red{color:#b91c1c}.blk{color:#111}.c4{width:36px;height:36px;border-radius:50%;background:#e5e7eb}.c4.r{background:#ef4444}.c4.y{background:#facc15}</style></head><body><main class='content'><section class='panel'><h1>Old School Board Games</h1><p>Mobile-ready board games with quick instructions. Tap a game tab to play.</p><div class='tabs'><button id='tTT'>Tic Tac Toe</button><button id='tC4'>Connect 4</button><button id='tChess'>Chess</button><button id='tCheck'>Checkers</button><a class='card' href='../../index.html'><h3>Back Home</h3><p>Return to homepage.</p></a></div><div id='how' class='card' style='margin-top:8px'><h3>How To</h3><p id='howTxt'>Tap a tab above to start.</p><button id='dismiss'>Dismiss</button></div><div id='game' style='margin-top:10px'></div><div id='status' class='card' style='margin-top:8px'>Status: Ready.</div></section></main>
<script>
const game=document.getElementById('game'),statusEl=document.getElementById('status'),how=document.getElementById('how'),howTxt=document.getElementById('howTxt');dismiss.onclick=()=>how.style.display='none';
function setHow(t){how.style.display='block';howTxt.textContent=t}
// TicTacToe
function ttt(){setHow('Tic Tac Toe: tap a square to place X/O. First to 3 wins.');let b=Array(9).fill(''),turn='X';game.innerHTML="<div class='board' style='grid-template-columns:repeat(3,36px)'>"+b.map((_,i)=>`<button class='cell' data-i='${i}'></button>`).join('')+'</div>';const cells=[...game.querySelectorAll('.cell')];cells.forEach(c=>c.onclick=()=>{const i=+c.dataset.i;if(b[i])return;b[i]=turn;c.textContent=turn;const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].find(x=>x.every(n=>b[n]===turn));if(w){statusEl.textContent='Status: '+turn+' wins!';return;}turn=turn==='X'?'O':'X';statusEl.textContent='Status: '+turn+' turn.';});}
// Connect4
function c4(){setHow('Connect 4: tap a column to drop piece. Connect 4 to win.');let g=Array.from({length:6},()=>Array(7).fill(''));let t='R';function render(){game.innerHTML="<div class='board' style='grid-template-columns:repeat(7,38px)'>"+g.map((r,ri)=>r.map((v,ci)=>`<button class='cell dark' data-c='${ci}'><div class='c4 ${v==='R'?'r':v==='Y'?'y':''}'></div></button>`).join('')).join('')+'</div>';[...game.querySelectorAll('.cell')].forEach(c=>c.onclick=()=>drop(+c.dataset.c));}
function win(r,c,p){const d=[[1,0],[0,1],[1,1],[1,-1]];for(const [dr,dc] of d){let n=1;for(let s=1;s<4;s++){const rr=r+dr*s,cc=c+dc*s;if(g[rr]?.[cc]===p)n++;else break;}for(let s=1;s<4;s++){const rr=r-dr*s,cc=c-dc*s;if(g[rr]?.[cc]===p)n++;else break;}if(n>=4)return true;}return false;}
function drop(c){for(let r=5;r>=0;r--)if(!g[r][c]){g[r][c]=t;render();if(win(r,c,t)){statusEl.textContent='Status: '+(t==='R'?'Red':'Yellow')+' wins!';return;}t=t==='R'?'Y':'R';statusEl.textContent='Status: '+(t==='R'?'Red':'Yellow')+' turn.';return;}}
render();}
// Chess basic
function chess(){setHow('Chess: tap piece then destination. Basic legal movement; check/checkmate not enforced.');let b=[['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];let sel=null,turn='W';const sym={k:'тЩЪ',q:'тЩЫ',r:'тЩЬ',b:'тЩЭ',n:'тЩЮ',p:'тЩЯ',K:'тЩФ',Q:'тЩХ',R:'тЩЦ',B:'тЩЧ',N:'тЩШ',P:'тЩЩ'};
function color(p){if(!p)return'';return p===p.toUpperCase()?'W':'B';}
function legal(sr,sc,tr,tc){const p=b[sr][sc];if(!p||color(p)!==turn||color(b[tr][tc])===turn)return false;const dr=tr-sr,dc=tc-sc,a=Math.abs;const lower=p.toLowerCase();if(lower==='p'){const dir=turn==='W'?-1:1;return (dc===0&&!b[tr][tc]&&dr===dir)||(a(dc)===1&&dr===dir&&b[tr][tc]);}
if(lower==='r')return dr===0||dc===0;if(lower==='b')return a(dr)===a(dc);if(lower==='q')return dr===0||dc===0||a(dr)===a(dc);if(lower==='n')return (a(dr)===2&&a(dc)===1)||(a(dr)===1&&a(dc)===2);if(lower==='k')return a(dr)<=1&&a(dc)<=1;return false;}
function render(){game.innerHTML="<div class='board' style='grid-template-columns:repeat(8,36px)'>"+b.map((r,ri)=>r.map((v,ci)=>`<button class='cell ${(ri+ci)%2?'dark':''}' data-r='${ri}' data-c='${ci}'>${sym[v]||''}</button>`).join('')).join('')+'</div>';[...game.querySelectorAll('.cell')].forEach(c=>c.onclick=()=>tap(+c.dataset.r,+c.dataset.c));}
function tap(r,c){if(!sel){if(color(b[r][c])===turn)sel=[r,c];return;}const[sr,sc]=sel;if(legal(sr,sc,r,c)){b[r][c]=b[sr][sc];b[sr][sc]='';turn=turn==='W'?'B':'W';statusEl.textContent='Status: '+(turn==='W'?'White':'Black')+' turn.';}sel=null;render();}
render();}
// Checkers basic
function checkers(){setHow('Checkers: tap piece then destination diagonal square. Captures by jumping.');let b=Array.from({length:8},(_,r)=>Array.from({length:8},(_,c)=>((r+c)%2? (r<3?'b':r>4?'r':'') : '')));let turn='r',sel=null;function render(){game.innerHTML="<div class='board' style='grid-template-columns:repeat(8,36px)'>"+b.map((r,ri)=>r.map((v,ci)=>`<button class='cell ${(ri+ci)%2?'dark':''}' data-r='${ri}' data-c='${ci}'>${v?`<span class='${v==='r'?'red':'blk'}'>тЧП</span>`:''}</button>`).join('')).join('')+'</div>';[...game.querySelectorAll('.cell')].forEach(c=>c.onclick=()=>tap(+c.dataset.r,+c.dataset.c));}
function tap(r,c){if(!sel){if(b[r][c]===turn)sel=[r,c];return;}const[sr,sc]=sel,dr=r-sr,dc=c-sc;if(!b[r][c]&&Math.abs(dc)===Math.abs(dr)&&(Math.abs(dr)===1||Math.abs(dr)===2)){if(Math.abs(dr)===2){const mr=(sr+r)/2,mc=(sc+c)/2;if(!b[mr][mc]||b[mr][mc]===turn){sel=null;return;}b[mr][mc]='';}b[r][c]=b[sr][sc];b[sr][sc]='';turn=turn==='r'?'b':'r';statusEl.textContent='Status: '+(turn==='r'?'Red':'Black')+' turn.';}sel=null;render();}
render();}

tTT.onclick=ttt;tC4.onclick=c4;tChess.onclick=chess;tCheck.onclick=checkers;ttt();
</script></body></html>
