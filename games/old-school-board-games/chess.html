<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Chess</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.wrap{display:grid;justify-content:center}.b{display:grid;grid-template-columns:repeat(8,min(11vw,64px));gap:3px;justify-content:center}.c{width:min(11vw,64px);height:min(11vw,64px);font-size:1.9rem;border:0;border-radius:12px}.d{background:#795548}.l{background:#d7b989}.sel{outline:3px solid #66d9ff}.hint{box-shadow:inset 0 0 0 4px #42f58d}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}</style></head><body><main class='content'><section class='panel'><h1>Chess Deluxe</h1><div id='how' class='card'><p>Larger board + optional move hints + CPU opponent (Black). Select a piece to see legal moves.</p><button id='close'>Start</button></div><div class='toolbar'><button id='toggleHints' class='btn'>Hints: On</button><button id='reset' class='btn'>Reset</button></div><div class='wrap'><div id='b' class='b'></div></div><div id='s' class='card'>White turn.</div><a class='btn' href='index.html'>Back to Board Games</a></section></main><script>close.onclick=()=>how.style.display='none';let hints=true;toggleHints.onclick=()=>{hints=!hints;toggleHints.textContent='Hints: '+(hints?'On':'Off');render()};const S={k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟',K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'};const col=p=>!p?'':(p===p.toUpperCase()?'W':'B');let B,sel=null,t='W';function init(){B=[['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];sel=null;t='W';s.textContent='White turn.';render()}reset.onclick=init;
function clearPath(sr,sc,tr,tc){const dr=Math.sign(tr-sr),dc=Math.sign(tc-sc);let r=sr+dr,c=sc+dc;while(r!==tr||c!==tc){if(B[r][c])return false;r+=dr;c+=dc;}return true}
function legal(sr,sc,tr,tc){const p=B[sr][sc];if(!p||col(p)!==t||col(B[tr][tc])===t)return false;const dr=tr-sr,dc=tc-sc,a=Math.abs,l=p.toLowerCase();if(l==='p'){const dir=t==='W'?-1:1,start=t==='W'?6:1;return (dc===0&&!B[tr][tc]&&dr===dir)||(dc===0&&!B[tr][tc]&&sr===start&&dr===2*dir&&!B[sr+dir][sc])||(a(dc)===1&&dr===dir&&B[tr][tc]);}if(l==='r')return (dr===0||dc===0)&&clearPath(sr,sc,tr,tc);if(l==='b')return a(dr)===a(dc)&&clearPath(sr,sc,tr,tc);if(l==='q')return (dr===0||dc===0||a(dr)===a(dc))&&clearPath(sr,sc,tr,tc);if(l==='n')return (a(dr)===2&&a(dc)===1)||(a(dr)===1&&a(dc)===2);if(l==='k')return a(dr)<=1&&a(dc)<=1;return false;}
function legalMoves(r,c){const out=[];for(let tr=0;tr<8;tr++)for(let tc=0;tc<8;tc++)if(legal(r,c,tr,tc))out.push([tr,tc]);return out}
function allMoves(side){const keep=t;t=side;const out=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(col(B[r][c])===side)for(const [tr,tc] of legalMoves(r,c))out.push([r,c,tr,tc]);t=keep;return out;}
function cpuTurn(){const m=allMoves('B');if(!m.length){s.textContent='Game over. White wins.';return;}const pick=m[Math.floor(Math.random()*m.length)];const[sr,sc,tr,tc]=pick;B[tr][tc]=B[sr][sc];B[sr][sc]='';t='W';s.textContent='White turn.';render();}
function render(){b.innerHTML='';const hs=sel&&hints?legalMoves(sel[0],sel[1]):[];for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('button');d.className='c '+((r+c)%2?'d':'l');if(sel&&sel[0]===r&&sel[1]===c)d.classList.add('sel');if(hs.some(m=>m[0]===r&&m[1]===c))d.classList.add('hint');d.textContent=S[B[r][c]]||'';d.onclick=()=>tap(r,c);b.appendChild(d);}}
function tap(r,c){if(t!=='W')return;if(!sel){if(col(B[r][c])==='W')sel=[r,c];render();return;}const[sr,sc]=sel;if(legal(sr,sc,r,c)){B[r][c]=B[sr][sc];B[sr][sc]='';t='B';s.textContent='CPU thinking...';sel=null;render();setTimeout(cpuTurn,280);return;}sel=col(B[r][c])==='W'?[r,c]:null;render();}
init();</script></body></html>
