<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Chess</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.b{display:grid;grid-template-columns:repeat(8,44px);gap:2px}.c{width:44px;height:44px;font-size:1.3rem}.d{background:#9ca3af}</style></head><body><main class='content'><section class='panel'><h1>Chess</h1><div id='how' class='card'><p>Tap a piece then destination square. Basic legal moves enabled.</p><button id='close'>Start</button></div><div id='b' class='b'></div><div id='s' class='card'>White turn.</div><a class='btn' href='index.html'>Back to Board Games</a></section></main><script>close.onclick=()=>how.style.display='none';let B=[['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']],sel=null,t='W';const S={k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟',K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'};const col=p=>!p?'':(p===p.toUpperCase()?'W':'B');function legal(sr,sc,tr,tc){const p=B[sr][sc];if(!p||col(p)!==t||col(B[tr][tc])===t)return false;const dr=tr-sr,dc=tc-sc,a=Math.abs,l=p.toLowerCase();if(l==='p'){const dir=t==='W'?-1:1;return (dc===0&&!B[tr][tc]&&dr===dir)||(a(dc)===1&&dr===dir&&B[tr][tc]);}if(l==='r')return dr===0||dc===0;if(l==='b')return a(dr)===a(dc);if(l==='q')return dr===0||dc===0||a(dr)===a(dc);if(l==='n')return (a(dr)===2&&a(dc)===1)||(a(dr)===1&&a(dc)===2);if(l==='k')return a(dr)<=1&&a(dc)<=1;return false;}function render(){b.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('button');d.className='c '+((r+c)%2?'d':'');d.textContent=S[B[r][c]]||'';d.onclick=()=>tap(r,c);b.appendChild(d);}}function tap(r,c){if(!sel){if(col(B[r][c])===t)sel=[r,c];return;}const[sr,sc]=sel;if(legal(sr,sc,r,c)){B[r][c]=B[sr][sc];B[sr][sc]='';t=t==='W'?'B':'W';s.textContent=(t==='W'?'White':'Black')+' turn.';}sel=null;render();}render();</script></body></html>
