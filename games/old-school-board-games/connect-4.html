<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Connect 4</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.b{display:grid;grid-template-columns:repeat(7,52px);gap:4px;background:#0b3e86;padding:8px;border-radius:8px}.c{width:52px;height:52px;border-radius:50%;background:#eee;border:0}.r{background:#ef4444}.y{background:#facc15}</style></head><body><main class='content'><section class='panel'><h1>Connect 4</h1><div id='how' class='card'><p>Tap any column to drop a disc. Connect four to win.</p><button id='close'>Start</button></div><div class='b' id='b'></div><div id='s' class='card'>Red turn.</div><a class='btn' href='index.html'>Back to Board Games</a></section></main><script>close.onclick=()=>how.style.display='none';let g=Array.from({length:6},()=>Array(7).fill('')),t='R';function w(r,c,p){for(const[d1,d2]of[[1,0],[0,1],[1,1],[1,-1]]){let n=1;for(let s=1;s<4;s++){if(g[r+d1*s]?.[c+d2*s]===p)n++;else break;}for(let s=1;s<4;s++){if(g[r-d1*s]?.[c-d2*s]===p)n++;else break;}if(n>=4)return true;}return false;}function render(){b.innerHTML='';for(let r=0;r<6;r++)for(let c=0;c<7;c++){let d=document.createElement('button');d.className='c '+(g[r][c]==='R'?'r':g[r][c]==='Y'?'y':'');d.dataset.c=c;d.onclick=()=>drop(+d.dataset.c);b.appendChild(d);}}function drop(c){for(let r=5;r>=0;r--)if(!g[r][c]){g[r][c]=t;render();if(w(r,c,t)){s.textContent=(t==='R'?'Red':'Yellow')+' wins!';return;}t=t==='R'?'Y':'R';s.textContent=(t==='R'?'Red':'Yellow')+' turn.';return;}}render();</script></body></html>
