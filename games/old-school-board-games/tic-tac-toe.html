<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Tic Tac Toe</title><link rel='stylesheet' href='../../assets/css/site.css'><style>.b{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:420px}.c{height:110px;font-size:3rem}</style></head><body><main class='content'><section class='panel'><h1>Tic Tac Toe</h1><div id='how' class='card'><p>Tap any square to place X/O. First to 3 in a row wins.</p><button id='close'>Start</button></div><div class='b' id='b'></div><div id='s' class='card'>X turn.</div><a class='btn' href='index.html'>Back to Board Games</a></section></main><script>close.onclick=()=>how.style.display='none';let t='X',a=Array(9).fill('');b.innerHTML=a.map((_,i)=>`<button class='c' data-i='${i}'></button>`).join('');[...b.children].forEach(c=>c.onclick=()=>{const i=+c.dataset.i;if(a[i])return;a[i]=t;c.textContent=t;const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].find(x=>x.every(n=>a[n]===t));if(w){s.textContent=t+' wins!';return;}t=t==='X'?'O':'X';s.textContent=t+' turn.';});</script></body></html>
