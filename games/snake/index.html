<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon String Snake</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0a0f1a;
        color: #f1f5f9;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .wrap { width: min(94vw, 760px); }
      .hud {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .badge { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 6px 10px; }
      canvas {
        width: 100%;
        max-width: 760px;
        aspect-ratio: 1;
        border: 2px solid #334155;
        border-radius: 14px;
        background: #070b14;
        touch-action: none;
      }
      .controls { margin-top: 10px; font-size: .95rem; color: #cbd5e1; }
      button {
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Neon String Snake</h1>
      <div class="hud">
        <div class="badge">Length: <strong id="length">6</strong></div>
        <div class="badge">Score: <strong id="score">0</strong></div>
        <div class="badge">Status: <strong id="status">Running</strong></div>
        <button id="reset">Reset</button>
      </div>
      <canvas id="game" width="720" height="720" aria-label="Snake game"></canvas>
      <p class="controls">
        Controls: Arrow keys, WASD, mouse click/tap direction. Eat apples to grow.
        Bombs occasionally appear—touching one shatters snake length into collectible chunks.
      </p>
    </main>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const grid = 24;
      const cell = canvas.width / grid;

      const lengthEl = document.getElementById('length');
      const scoreEl = document.getElementById('score');
      const statusEl = document.getElementById('status');
      const resetBtn = document.getElementById('reset');

      let snake, dir, nextDir, apple, bombs, chunks, score, over, tick;

      function randCell() { return { x: (Math.random() * grid) | 0, y: (Math.random() * grid) | 0 }; }
      function same(a, b) { return a.x === b.x && a.y === b.y; }

      function occupied(p) {
        return snake.some(s => same(s, p)) || bombs.some(b => same(b, p)) || chunks.some(c => same(c, p)) || same(apple, p);
      }

      function spawnFree() {
        let p = randCell();
        let guard = 0;
        while (occupied(p) && guard < 500) { p = randCell(); guard++; }
        return p;
      }

      function reset() {
        snake = [];
        for (let i = 0; i < 6; i++) snake.push({ x: 8 - i, y: 10 });
        dir = { x: 1, y: 0 };
        nextDir = { ...dir };
        bombs = [];
        chunks = [];
        score = 0;
        over = false;
        apple = { x: 16, y: 10 };
        tick = 0;
        statusEl.textContent = 'Running';
      }

      function setDirection(nx, ny) {
        if (over) return;
        if (dir.x === -nx && dir.y === -ny) return;
        nextDir = { x: nx, y: ny };
      }

      function shatterSnake() {
        const loss = Math.max(2, Math.floor(snake.length * 0.4));
        const pieces = Math.min(6, loss);
        let remaining = loss;
        for (let i = 0; i < pieces; i++) {
          const size = i === pieces - 1 ? remaining : Math.max(1, ((remaining / (pieces - i)) * (0.6 + Math.random() * 0.8)) | 0);
          remaining -= size;
          chunks.push({ ...spawnFree(), size });
        }
        snake = snake.slice(0, Math.max(3, snake.length - loss));
      }

      function update() {
        if (over) return;
        tick++;
        dir = nextDir;
        const head = { x: (snake[0].x + dir.x + grid) % grid, y: (snake[0].y + dir.y + grid) % grid };

        if (snake.some(s => same(s, head))) {
          over = true;
          statusEl.textContent = 'Game Over (self collision)';
          return;
        }

        snake.unshift(head);

        let grew = false;
        if (same(head, apple)) {
          score += 10;
          apple = spawnFree();
          grew = true;
        }

        const bombIdx = bombs.findIndex(b => same(b, head));
        if (bombIdx >= 0) {
          bombs.splice(bombIdx, 1);
          shatterSnake();
          score = Math.max(0, score - 5);
          statusEl.textContent = 'Boom! Recover chunks.';
          setTimeout(() => { if (!over) statusEl.textContent = 'Running'; }, 600);
        }

        const chunkIdx = chunks.findIndex(c => same(c, head));
        if (chunkIdx >= 0) {
          const part = chunks.splice(chunkIdx, 1)[0];
          for (let i = 0; i < part.size; i++) snake.push({ ...snake[snake.length - 1] });
          score += part.size * 2;
          grew = true;
        }

        if (!grew) snake.pop();

        if (tick % 28 === 0 && bombs.length < 3 && Math.random() < 0.8) bombs.push(spawnFree());

        lengthEl.textContent = snake.length;
        scoreEl.textContent = score;
      }

      function snakeColor(i, t) {
        const hue = (t * 5 + i * 22) % 360;
        return `hsl(${hue} 95% 58%)`;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // subtle grid
        ctx.strokeStyle = '#101826';
        ctx.lineWidth = 1;
        for (let i = 0; i <= grid; i++) {
          ctx.beginPath();
          ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, canvas.height); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i * cell); ctx.lineTo(canvas.width, i * cell); ctx.stroke();
        }

        // apple
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc((apple.x + .5) * cell, (apple.y + .5) * cell, cell * 0.32, 0, Math.PI * 2);
        ctx.fill();

        // bombs
        bombs.forEach(b => {
          ctx.fillStyle = '#f59e0b';
          ctx.beginPath();
          ctx.arc((b.x + .5) * cell, (b.y + .5) * cell, cell * 0.34, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#111827';
          ctx.fillRect((b.x + .46) * cell, (b.y + .17) * cell, cell * 0.08, cell * 0.16);
        });

        // chunks
        chunks.forEach(c => {
          ctx.fillStyle = '#22d3ee';
          ctx.fillRect(c.x * cell + 3, c.y * cell + 3, cell - 6, cell - 6);
          ctx.fillStyle = '#082f49';
          ctx.font = `${Math.floor(cell * .42)}px sans-serif`;
          ctx.fillText(String(c.size), c.x * cell + cell * .3, c.y * cell + cell * .68);
        });

        // flashing snake
        snake.forEach((s, i) => {
          ctx.fillStyle = snakeColor(i, tick);
          ctx.shadowBlur = i < 2 ? 16 : 8;
          ctx.shadowColor = ctx.fillStyle;
          ctx.fillRect(s.x * cell + 2, s.y * cell + 2, cell - 4, cell - 4);
        });
        ctx.shadowBlur = 0;
      }

      function loop() {
        update();
        draw();
      }

      // keyboard
      addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (k === 'arrowup' || k === 'w') setDirection(0, -1);
        if (k === 'arrowdown' || k === 's') setDirection(0, 1);
        if (k === 'arrowleft' || k === 'a') setDirection(-1, 0);
        if (k === 'arrowright' || k === 'd') setDirection(1, 0);
      });

      // pointer direction by relative click/touch from head
      function pointerDirection(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const px = ((clientX - rect.left) / rect.width) * grid;
        const py = ((clientY - rect.top) / rect.height) * grid;
        const hx = snake[0].x + .5;
        const hy = snake[0].y + .5;
        const dx = px - hx;
        const dy = py - hy;
        if (Math.abs(dx) > Math.abs(dy)) setDirection(Math.sign(dx), 0);
        else setDirection(0, Math.sign(dy));
      }

      canvas.addEventListener('click', (e) => pointerDirection(e.clientX, e.clientY));
      canvas.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        pointerDirection(t.clientX, t.clientY);
      }, { passive: true });

      resetBtn.onclick = reset;
      reset();
      setInterval(loop, 95);
    </script>
  </body>
</html>
