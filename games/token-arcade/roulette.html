<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Roulette</title><link rel='stylesheet' href='common.css'><style>.wheelWrap{text-align:center}.wheel{width:220px;height:220px;border-radius:50%;border:6px solid #dcefd1;background:#0f2238;position:relative;margin:6px auto;transition:transform 2.3s}.p{position:absolute;left:50%;top:50%;transform-origin:0 0;font-size:10px}.ball{position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;left:50%;top:50%;margin:-6px}.spinBall{animation:orbit 2.3s linear}@keyframes orbit{from{transform:rotate(0deg) translate(96px)}to{transform:rotate(900deg) translate(96px)}}.grid{display:grid;grid-template-columns:72px repeat(12,55px);gap:2px;justify-content:center}.n{height:42px;display:grid;place-items:center;border:1px solid #eaf7dd;position:relative}.r{background:#c62828}.b{background:#111}.g{background:#1f9f57}.chip{position:absolute;right:2px;top:2px;background:#ffd166;color:#111;border-radius:10px;padding:0 4px;font-size:10px}.outside{display:grid;grid-template-columns:repeat(6,minmax(80px,1fr));gap:2px;max-width:760px;margin:6px auto}.o{height:40px;display:grid;place-items:center;border:1px solid #eaf7dd;background:#0d6f31}.popup{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.5)}.popup.show{display:grid}.card{background:#122642;border:1px solid #456;padding:16px;border-radius:12px}.win{font-size:2rem;color:#ffd166}</style></head><body><div class='wrap'>
<div class='notice'>Testing only: SpendTokens have no real-world value.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div>
<div class='panel'><div style='display:flex;gap:8px;flex-wrap:wrap;justify-content:center'><label>Wheel <select id='wheel'><option value='a'>American</option><option value='e'>European</option></select></label><button class='btn' id='spin'>SPIN</button><button class='btn' id='clear'>Remove Bets</button><button class='btn' id='repeat'>Repeat Bet</button><button class='btn' id='historyBtn'>History</button></div>
<div class='token-rail' id='rail'></div><div class='board wheelWrap'><img src='images/roulette-table.svg' alt='roulette layout' style='width:100%;max-width:900px;border:1px solid #d7efc4;border-radius:8px;margin-bottom:6px'><div class='wheel' id='w'><div class='ball' id='ball'></div></div><div class='grid' id='grid'></div><div class='outside' id='outside'></div></div><div style='text-align:center'>Bet: <span id='bet'>0</span> | Last: <span id='last'>-</span></div></div>
</div><div class='drawer' id='history'><h3>Last 50</h3><div id='hist'></div><hr><div id='pct'></div></div><div class='popup' id='pop'><div class='card'><div id='msg'></div><div id='wmsg'></div></div></div>
<script src='common.js'></script><script>
initWallet(); const red=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);const A=['0','28','9','26','30','11','7','20','32','17','5','22','34','15','3','24','36','13','1','00','27','10','25','29','12','8','19','31','18','6','21','33','16','4','23','35','14','2'],E=['0','32','15','19','4','21','2','25','17','34','6','27','13','36','11','30','8','23','10','5','24','16','33','1','20','14','31','9','22','18','29','7','28','12','35','3','26'];
const chipVals=[0.5,1,3,5,10,25,50,100],chipColors=['#fff','#66f','#0cf','#ff9','#f96','#f33','#9f9','#ddd'];let currentChip=5;chipVals.forEach((v,i)=>{let b=document.createElement('button');b.className='chip-btn';b.style.background=chipColors[i];b.textContent=v;b.onclick=()=>currentChip=v;rail.appendChild(b)});
let bets={},lastBet={},h=[];function seq(){return wheel.value==='a'?A:E}
function buildW(){w.querySelectorAll('.p').forEach(x=>x.remove());const s=seq(),st=360/s.length; s.forEach((n,i)=>{let d=document.createElement('div');d.className='p';d.style.transform=`rotate(${i*st}deg) translate(95px) rotate(${-i*st}deg)`;d.textContent=n;d.style.color=(n==='0'||n==='00')?'#7cffb2':(red.has(+n)?'#ff7777':'#fff');w.appendChild(d)})}
function outBtn(k,t){let d=document.createElement('button');d.className='o';d.textContent=t;d.onclick=()=>place(k,currentChip);outside.appendChild(d)}
outside.innerHTML='';[['out:red','RED'],['out:black','BLACK'],['out:odd','ODD'],['out:even','EVEN'],['col:1','2 to 1'],['col:2','2 to 1'],['col:3','2 to 1'],['row:1','1st 12'],['row:2','2nd 12'],['row:3','3rd 12'],['out:low','1 to 18'],['out:high','19 to 36']].forEach(x=>outBtn(...x));
function draw(){grid.innerHTML='';let add=(n,k,c)=>{let d=document.createElement('button');d.className='n '+c;d.textContent=n;d.onclick=()=>place(k,currentChip);let cv=bets[k]||0;if(cv){let c=document.createElement('span');c.className='chip';c.textContent=cv.toFixed(1);d.appendChild(c)}grid.appendChild(d)};add('0','n:0','g');for(let c=0;c<12;c++){[3,2,1].forEach(r=>{let n=c*3+r;add(n,'n:'+n,red.has(n)?'r':'b')})}if(wheel.value==='a')add('00','n:00','g')}
function validRowCol(key){if(key.startsWith('col:')){const id=key.split(':')[1];return !['1','2','3'].every(c=>bets['col:'+c]||key==='col:'+c)} if(key.startsWith('row:')){const id=key.split(':')[1];return !['1','2','3'].every(c=>bets['row:'+c]||key==='row:'+c)} return true;}
function place(k,a){if(!validRowCol(k))return; if(!spend(a))return;bets[k]=(bets[k]||0)+a;beep(540);upd()}
function upd(){bet.textContent=Object.values(bets).reduce((x,y)=>x+y,0).toFixed(2);setTokens(getTokens());draw()}
function pay(k,a,n){const x=+n;if(k==='n:'+n)return a*36;if(k==='out:red'&&red.has(x))return a*2;if(k==='out:black'&&!red.has(x)&&n!=='0'&&n!=='00')return a*2;if(k==='out:odd'&&x%2===1)return a*2;if(k==='out:even'&&x%2===0&&x>0)return a*2;if(k==='out:low'&&x>=1&&x<=18)return a*2;if(k==='out:high'&&x>=19&&x<=36)return a*2;if(k==='col:1'&&x%3===1)return a*3;if(k==='col:2'&&x%3===2)return a*3;if(k==='col:3'&&x%3===0)return a*3;if(k==='row:1'&&x>=1&&x<=12)return a*3;if(k==='row:2'&&x>=13&&x<=24)return a*3;if(k==='row:3'&&x>=25&&x<=36)return a*3;return 0}
function stats(){const d=h.slice(0,50);hist.innerHTML=d.map(x=>`<span class='btn' style='padding:6px;background:${x.c}'>${x.n}</span>`).join('');const t=d.length||1;pct.innerHTML=`Red ${((d.filter(x=>x.c==='red').length/t)*100).toFixed(1)}%<br>Black ${((d.filter(x=>x.c==='black').length/t)*100).toFixed(1)}%<br>Green ${((d.filter(x=>x.c==='green').length/t)*100).toFixed(1)}%`}
spin.onclick=()=>{const s=seq(),i=(Math.random()*s.length)|0,n=s[i];ball.classList.remove('spinBall');void ball.offsetWidth;ball.classList.add('spinBall');w.style.transform=`rotate(${(8+Math.random()*2)*360 + (360-(i*(360/s.length)))}deg)`;setTimeout(()=>{last.textContent=n;let win=0;for(const [k,a] of Object.entries(bets))win+=pay(k,a,n);add(win);lastBet={...bets};bets={};upd();const c=(n==='0'||n==='00')?'green':(red.has(+n)?'red':'black');h.unshift({n,c});h=h.slice(0,50);stats();msg.innerHTML=`<h2 style='font-size:2.3rem'>${n}</h2>`;wmsg.innerHTML=win?`<div class='win'>TOTAL WIN ${win.toFixed(2)} SpendTokens</div>`:'<div style="opacity:.8">No win</div>';pop.classList.add('show');beep(win?780:230,.16);setTimeout(()=>pop.classList.remove('show'),2400)},2300)};
clear.onclick=()=>{Object.values(bets).forEach(add);bets={};upd()};repeat.onclick=()=>{Object.entries(lastBet).forEach(([k,a])=>place(k,a))};historyBtn.onclick=()=>history.classList.toggle('open');wheel.onchange=()=>{draw();buildW()};buildW();draw();
</script><div class='gate' id='gate'><div class='box'><h2>Roulette</h2><p>Use SpendTokens only. Place bets or actions, then play a round. Educational testing only.</p><button class='btn' id='startBtn'>Start Game</button></div></div><script>document.getElementById('startBtn').onclick=()=>document.getElementById('gate').style.display='none';</script></body></html>
