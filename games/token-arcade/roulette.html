<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Roulette</title><link rel='stylesheet' href='common.css'><style>.wheel{width:220px;height:220px;border-radius:50%;border:6px solid #dcefd1;background:#0f2238;position:relative;margin:6px auto;transition:transform 2.3s}.p{position:absolute;left:50%;top:50%;transform-origin:0 0;font-size:10px}.grid{display:grid;grid-template-columns:72px repeat(12,55px);gap:2px}.n{height:42px;display:grid;place-items:center;border:1px solid #eaf7dd}.r{background:#c62828}.b{background:#111}.g{background:#1f9f57}.popup{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.5)}.popup.show{display:grid}.card{background:#122642;border:1px solid #456;padding:16px;border-radius:12px}.win{font-size:2rem;color:#ffd166}</style></head><body><div class='wrap'>
<div class='notice'>Testing only: SpendTokens have no real-world value.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div></div>
<div class='panel'><div style='display:flex;gap:8px;flex-wrap:wrap'><label>Wheel <select id='wheel'><option value='a'>American</option><option value='e'>European</option></select></label><label>Chip <select id='chip'></select></label><button class='btn' id='spin'>SPIN</button><button class='btn' id='clear'>Remove Bets</button><button class='btn' id='repeat'>Repeat Bet</button><button class='btn' id='historyBtn'>History</button></div>
<div class='board'><div id='wheelPane'><div style='text-align:center'>Wheel Slideout</div><div class='wheel' id='w'></div></div><div class='grid' id='grid'></div></div><div>Bet: <span id='bet'>0</span> | Last: <span id='last'>-</span></div></div>
</div><div class='drawer' id='history'><h3>Last 50</h3><div id='hist'></div><hr><div id='pct'></div></div><div class='popup' id='pop'><div class='card'><div id='msg'></div><div id='wmsg'></div></div></div>
<script src='common.js'></script><script>
initWallet(); const red=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);const A=['0','28','9','26','30','11','7','20','32','17','5','22','34','15','3','24','36','13','1','00','27','10','25','29','12','8','19','31','18','6','21','33','16','4','23','35','14','2'],E=['0','32','15','19','4','21','2','25','17','34','6','27','13','36','11','30','8','23','10','5','24','16','33','1','20','14','31','9','22','18','29','7','28','12','35','3','26'];
[0.5,1,3,5,10,25,50,100].forEach(v=>{let o=document.createElement('option');o.value=v;o.textContent=v;chip.appendChild(o)});
let bets={},lastBet={},h=[];function seq(){return wheel.value==='a'?A:E}
function buildW(){w.innerHTML='';const s=seq(),st=360/s.length; s.forEach((n,i)=>{let d=document.createElement('div');d.className='p';d.style.transform=`rotate(${i*st}deg) translate(95px) rotate(${-i*st}deg)`;d.textContent=n;d.style.color=(n==='0'||n==='00')?'#7cffb2':(red.has(+n)?'#ff7777':'#fff');w.appendChild(d)})}
function draw(){grid.innerHTML='';let add=(n,k,c)=>{let d=document.createElement('div');d.className='n '+c;d.textContent=n;d.onclick=()=>place(k,+chip.value);grid.appendChild(d)};add('0','n:0','g');for(let c=0;c<12;c++){[3,2,1].forEach(r=>{let n=c*3+r;add(n,'n:'+n,red.has(n)?'r':'b')})}if(wheel.value==='a')add('00','n:00','g')}
function place(k,a){if(!spend(a))return;bets[k]=(bets[k]||0)+a;upd()}
function upd(){bet.textContent=Object.values(bets).reduce((x,y)=>x+y,0).toFixed(2);setTokens(getTokens())}
function pay(k,a,n){if(k==='n:'+n)return a*36; if(k==='red'&&red.has(+n))return a*2; return 0}
function stats(){const d=h.slice(0,50);hist.innerHTML=d.map(x=>`<span class='btn' style='padding:6px;background:${x.c}'>${x.n}</span>`).join('');const t=d.length||1;pct.innerHTML=`Red ${((d.filter(x=>x.c==='red').length/t)*100).toFixed(1)}%<br>Black ${((d.filter(x=>x.c==='black').length/t)*100).toFixed(1)}%<br>Green ${((d.filter(x=>x.c==='green').length/t)*100).toFixed(1)}%`}
spin.onclick=()=>{const s=seq(),i=(Math.random()*s.length)|0,n=s[i];w.style.transform=`translateX(0) rotate(${(8+Math.random()*2)*360 + (360-(i*(360/s.length)))}deg)`;setTimeout(()=>{last.textContent=n;let win=0;for(const [k,a] of Object.entries(bets))win+=pay(k,a,n);add(win);lastBet={...bets};bets={};upd();const c=(n==='0'||n==='00')?'green':(red.has(+n)?'red':'black');h.unshift({n,c});h=h.slice(0,50);stats();msg.innerHTML=`<h2>Landed ${n}</h2>`;wmsg.innerHTML=win?`<div class='win'>+${win.toFixed(2)} SpendTokens</div>`:'<div style="opacity:.8">No win</div>';pop.classList.add('show');setTimeout(()=>pop.classList.remove('show'),2200)},2300)};
clear.onclick=()=>{Object.values(bets).forEach(add);bets={};upd()};repeat.onclick=()=>{Object.entries(lastBet).forEach(([k,a])=>place(k,a))};historyBtn.onclick=()=>history.classList.toggle('open');wheel.onchange=()=>{draw();buildW()};buildW();draw();
</script></body></html>
