<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Roulette</title><link rel='stylesheet' href='common.css'><style>
.layout{display:grid;grid-template-columns:minmax(600px,1fr) 220px;gap:10px;align-items:start}.tableWrap{background:#0e7f3e;border:2px solid #d7efc4;border-radius:8px;padding:8px;overflow:auto}
.rtbl{display:grid;grid-template-columns:58px repeat(12,54px) 58px;gap:2px;min-width:790px}.cell{height:52px;display:grid;place-items:center;border:1px solid #dcefd1;font-weight:700;cursor:pointer;position:relative;color:#fff}.green{background:#1a8f4e}.red{background:#d12626}.black{background:#111;color:#fff}.betCol{background:#2f7d3f}
.outside{display:grid;grid-template-columns:repeat(6,minmax(90px,1fr));gap:4px;margin-top:8px}.o{height:42px;border:1px solid #dcefd1;display:grid;place-items:center;color:#fff;cursor:pointer;position:relative}.o.redBox{background:#b91c1c}.o.blackBox{background:#111}.o.other{background:#1d7a3d}
.chip{position:absolute;right:2px;top:2px;background:#ffd166;color:#111;border-radius:10px;padding:0 4px;font-size:10px}.wheel{width:210px;height:210px;border-radius:50%;border:6px solid #dcefd1;background:#0f2238;position:relative;margin:auto;transition:transform 2.3s}.p{position:absolute;left:50%;top:50%;transform-origin:0 0;font-size:9px}.ball{position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;left:50%;top:50%;margin:-5px}
</style></head><body><div class='wrap'><div class='notice'>Testing only: SpendTokens have no real-world value.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div>
<div class='panel'><div style='display:flex;gap:8px;flex-wrap:wrap;justify-content:center'><label>Wheel <select id='wheel'><option value='e'>European</option><option value='a'>American</option></select></label><button class='btn' id='spin'>SPIN</button><button class='btn' id='clear'>Remove Bets</button><button class='btn' id='repeat'>Repeat Bet</button></div><div class='token-rail' id='rail'></div>
<div class='layout'><div class='tableWrap'><div id='rtbl' class='rtbl'></div><div id='outside' class='outside'></div></div><div><div class='wheel' id='w'><div class='ball' id='ball'></div></div><div style='text-align:center;margin-top:6px'>Last: <span id='last'>-</span><br>Bet: <span id='bet'>0</span></div></div></div></div></div>
<script src='common.js'></script><script>
initWallet(); const redSet=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const E=['0','32','15','19','4','21','2','25','17','34','6','27','13','36','11','30','8','23','10','5','24','16','33','1','20','14','31','9','22','18','29','7','28','12','35','3','26'];
const A=['0','28','9','26','30','11','7','20','32','17','5','22','34','15','3','24','36','13','1','00','27','10','25','29','12','8','19','31','18','6','21','33','16','4','23','35','14','2'];
const chipVals=[0.5,1,3,5,10,25,50,100,250,500],chipColors=['#fff','#66f','#0cf','#ff9','#f96','#f33','#9f9','#ddd','#f0f','#fc3'];let currentChip=5;chipVals.forEach((v,i)=>{let b=document.createElement('button');b.className='chip-btn';b.style.background=chipColors[i];b.textContent=v;b.onclick=()=>currentChip=v;rail.appendChild(b)});
let bets={},lastBet={};
function seq(){return wheel.value==='a'?A:E}
function drawWheel(){w.querySelectorAll('.p').forEach(x=>x.remove());const s=seq(),st=360/s.length;s.forEach((n,i)=>{let d=document.createElement('div');d.className='p';d.style.transform=`rotate(${i*st}deg) translate(90px) rotate(${-i*st}deg)`;d.textContent=n;d.style.color=(n==='0'||n==='00')?'#7cffb2':(redSet.has(+n)?'#ff8d8d':'#fff');w.appendChild(d)});}
function place(k,a){if(!spend(a))return;bets[k]=(bets[k]||0)+a;render();}
function makeCell(label,key,cls='green'){const d=document.createElement('button');d.className='cell '+cls;d.textContent=label;d.onclick=()=>place(key,currentChip);if(bets[key]){let c=document.createElement('span');c.className='chip';c.textContent=bets[key].toFixed(1);d.appendChild(c)}return d}
function renderTable(){rtbl.innerHTML='';const am=wheel.value==='a';rtbl.appendChild(makeCell(am?'0/00':'0',am?'n:0,n:00':'n:0','green'));for(let c=0;c<12;c++){const n3=c*3+3,n2=c*3+2,n1=c*3+1;[n3,n2,n1].forEach(n=>rtbl.appendChild(makeCell(n,'n:'+n,redSet.has(n)?'red':'black')));}rtbl.appendChild(makeCell('2 to 1','col:3','betCol'));for(let r=2;r>=0;r--){rtbl.children[1+r*13+12].remove();} // keep simple fixed grid
// add right column manually
for(let r=0;r<3;r++){const el=makeCell('2 to 1','col:'+(r+1),'betCol');el.style.gridColumn='14';el.style.gridRow=String(r+1);rtbl.appendChild(el)}
if(am){const zz=makeCell('00','n:00','green');zz.style.gridColumn='1';zz.style.gridRow='1';rtbl.appendChild(zz)} }
function renderOutside(){outside.innerHTML='';[['out:red','RED','redBox'],['out:black','BLACK','blackBox'],['out:odd','ODD','other'],['out:even','EVEN','other'],['row:1','1st 12','other'],['row:2','2nd 12','other'],['row:3','3rd 12','other'],['out:low','1 to 18','other'],['out:high','19 to 36','other']].forEach(([k,t,cl])=>{let b=document.createElement('button');b.className='o '+cl;b.textContent=t;b.onclick=()=>place(k,currentChip);if(bets[k]){let c=document.createElement('span');c.className='chip';c.textContent=bets[k].toFixed(1);b.appendChild(c)}outside.appendChild(b)});}
function render(){bet.textContent=Object.values(bets).reduce((a,b)=>a+b,0).toFixed(2);setTokens(getTokens());renderTable();renderOutside();}
function pay(k,a,n){const x=+n;if(k==='n:'+n)return a*36;if(k==='n:0,n:00'&&(n==='0'||n==='00'))return a*18;if(k==='out:red'&&redSet.has(x))return a*2;if(k==='out:black'&&!redSet.has(x)&&n!=='0'&&n!=='00')return a*2;if(k==='out:odd'&&x%2===1)return a*2;if(k==='out:even'&&x%2===0&&x>0)return a*2;if(k==='out:low'&&x>=1&&x<=18)return a*2;if(k==='out:high'&&x>=19&&x<=36)return a*2;if(k==='col:1'&&x%3===1)return a*3;if(k==='col:2'&&x%3===2)return a*3;if(k==='col:3'&&x%3===0)return a*3;if(k==='row:1'&&x>=1&&x<=12)return a*3;if(k==='row:2'&&x>=13&&x<=24)return a*3;if(k==='row:3'&&x>=25&&x<=36)return a*3;return 0}
spin.onclick=()=>{const s=seq(),i=(Math.random()*s.length)|0,n=s[i];w.style.transform=`rotate(${(8+Math.random()*2)*360 + (360-(i*(360/s.length)))}deg)`;setTimeout(()=>{last.textContent=n;let win=0;for(const [k,a] of Object.entries(bets))win+=pay(k,a,n);add(win);if(win>0)celebrateWin(win>=50?'JACKPOT!':'WINNER!',win,'Roulette payout!');lastBet={...bets};bets={};render();beep(win?780:230,.16)},2300)};
clear.onclick=()=>{Object.values(bets).forEach(add);bets={};render()};repeat.onclick=()=>{Object.entries(lastBet).forEach(([k,a])=>place(k,a))};wheel.onchange=()=>{drawWheel();render()};drawWheel();render();
</script><div class='gate' id='gate'><div class='box'><h2>Roulette</h2><p>How to play: pick chip, tap table cells (numbers/rows/columns/outside), then SPIN. European has single 0; American adds 00.</p><button class='btn' id='startBtn'>Start Game</button></div></div><script>startBtn.onclick=()=>gate.style.display='none';</script></body></html>
