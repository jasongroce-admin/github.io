<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Craps</title><link rel='stylesheet' href='common.css'><style>.board{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.z{min-height:54px;border:1px solid #eaf7dd;border-radius:8px;display:grid;place-items:center;background:#0a7d35}.die{font-size:3rem}</style></head><body><div class='wrap'><div class='notice'>Testing only: SpendTokens have no real-world value.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel'><div class='board' id='board'></div><div id='chips' style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'></div><div style='margin-top:8px'><button class='btn' id='repeat'>Repeat Bet</button><button class='btn' id='clear'>Remove Bets</button><button class='btn' id='roll'>Roll Dice</button><button class='btn' id='histBtn'>History</button></div><div class='die'>🎲 <span id='dice'>2</span></div><div>Point: <span id='point'>OFF</span></div><div class='log' id='log'></div></div></div><div class='drawer' id='hist'><h3>Last 50</h3><div id='histItems'></div></div><script src='common.js'></script><script>initWallet();const zones=['pass','dont','field','4','5','6','8','9','10','small','tall','all','hop7','anycraps'];let pick=1,bets={},prev={},pointV=0,h=[];[0.5,1,3,5,10,25,50,100].forEach(v=>{let c=document.createElement('button');c.className='btn';c.textContent=v;c.onclick=()=>pick=v;chips.appendChild(c)});zones.forEach(z=>{let d=document.createElement('div');d.className='z';d.textContent=z.toUpperCase();d.onclick=()=>{if(!spend(pick))return;bets[z]=(bets[z]||0)+pick;d.textContent=z.toUpperCase()+' '+bets[z].toFixed(1)};board.appendChild(d)});function pay(k,a,s){if(['4','5','6','8','9','10'].includes(k)&&Number(k)===s)return a*2; if(k==='field'&&[2,3,4,9,10,11,12].includes(s))return a*(s===2||s===12?3:2);if(k==='small'&&s>=4&&s<=10)return a*2;if(k==='tall'&&s>=2&&s<=6)return a*2;if(k==='all')return a*2;if(k==='hop7'&&s===7)return a*16;if(k==='anycraps'&&[2,3,12].includes(s))return a*8;if(k==='pass'){if(!pointV&&(s===7||s===11))return a*2;if(!pointV&&[4,5,6,8,9,10].includes(s)){pointV=s;return null}if(pointV&&s===pointV){pointV=0;return a*2}if(pointV&&s===7){pointV=0;return 0}return null}if(k==='dont'){if(!pointV&&[2,3].includes(s))return a*2;if(!pointV&&s===12)return a;if(!pointV&&[4,5,6,8,9,10].includes(s)){pointV=s;return null}if(pointV&&s===7){pointV=0;return a*2}if(pointV&&s===pointV){pointV=0;return 0}return null}return 0}
roll.onclick=()=>{let c=0,t=2;const iv=setInterval(()=>{t=1+((Math.random()*6)|0)+1+((Math.random()*6)|0);dice.textContent=t;c++;if(c>8){clearInterval(iv);let w=0;for(const [k,a] of Object.entries(bets)){let r=pay(k,a,t);if(r!==null){w+=r;delete bets[k]}}add(w);point.textContent=pointV||'OFF';log.innerHTML=`• Rolled ${t} ${w?`+${w.toFixed(2)} SpendTokens`:'no win'}<br>`+log.innerHTML;prev={...bets};h.unshift(t);h=h.slice(0,50);histItems.innerHTML=h.map(n=>`<span class='btn' style='padding:6px'>${n}</span>`).join('');Array.from(board.children).forEach((d,i)=>d.textContent=zones[i].toUpperCase());setTokens(getTokens())}},80)};repeat.onclick=()=>{Object.entries(prev).forEach(([k,v])=>{if(spend(v))bets[k]=(bets[k]||0)+v})};clear.onclick=()=>{Object.values(bets).forEach(add);bets={};Array.from(board.children).forEach((d,i)=>d.textContent=zones[i].toUpperCase());setTokens(getTokens())};histBtn.onclick=()=>hist.classList.toggle('open');</script></body></html>
