<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Craps</title><link rel='stylesheet' href='common.css'><style>.board{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.z{min-height:54px;border:1px solid #eaf7dd;border-radius:8px;display:grid;place-items:center;background:#0a7d35;position:relative}.tok{position:absolute;top:4px;right:4px;background:#ffd166;color:#111;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;font-size:.72rem;font-weight:700}.die{font-size:3rem}</style></head><body><div class='wrap'><div class='notice'>Testing only: SpendTokens have no real-world value.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel'><div style='display:flex;gap:8px;flex-wrap:wrap'><label>Mode <select id='mode'><option value='craps'>Craps</option><option value='easy'>Easy Craps</option><option value='crapless'>Crapless</option></select></label><span id='modeInfo' class='notice'>Standard rules.</span></div><img id='tableImg' src='images/craps-table-craps.svg' alt='craps table' style='width:100%;max-width:900px;border:1px solid #d7efc4;border-radius:8px;margin:6px 0'><div class='board' id='board'></div><div id='chips' style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'></div><div style='margin-top:8px'><button class='btn' id='repeat'>Repeat Bet</button><button class='btn' id='clear'>Remove Bets</button><button class='btn' id='roll'>Roll Dice</button><button class='btn' id='histBtn'>History</button></div><div class='die'>🎲 <span id='dice'>2</span></div><div>Point: <span id='point'>OFF</span></div><div class='log' id='log'></div></div></div><div class='drawer' id='hist'><h3>Last 50</h3><div id='histItems'></div></div><script src='common.js'></script><script>initWallet();const zones=['pass','dont','field','4','5','6','8','9','10','num2','num3','num11','num12','small','tall','all','hop7','anycraps'];let pick=1,bets={},prev={},pointV=0,h=[];[0.5,1,3,5,10,25,50,100].forEach(v=>{let c=document.createElement('button');c.className='btn';c.textContent=v;c.onclick=()=>pick=v;chips.appendChild(c)});zones.forEach(z=>{let d=document.createElement('div');d.className='z';d.dataset.z=z;d.onclick=()=>{if(!spend(pick))return;bets[z]=(bets[z]||0)+pick;beep(520);renderBoard()};board.appendChild(d)});
function modeText(){modeInfo.textContent=mode.value==='craps'?'Standard craps: 2/3/12 lose on Pass.':mode.value==='easy'?'Easy Craps: 2/3 become pushes for Pass demo mode.':'Crapless: 2,3,12 can establish point.'}
mode.onchange=()=>{modeText();tableImg.src=mode.value==='craps'?'images/craps-table-craps.svg':mode.value==='easy'?'images/craps-table-easy.svg':'images/craps-table-crapless.svg';}; modeText();
function renderBoard(){const labels={num2:'2',num3:'3',num11:'11',num12:'12',anycraps:'ANY CRAPS',hop7:'HOP 7'};Array.from(board.children).forEach((d,i)=>{const z=zones[i];d.textContent=labels[z]||z.toUpperCase();const old=d.querySelector('.tok');if(old)old.remove();const v=bets[z]||0;if(v){const t=document.createElement('span');t.className='tok';t.textContent=v.toFixed(0);d.appendChild(t)}})}
function passComeout(sum){if(sum===7||sum===11)return 'win';if(mode.value==='craps'&&[2,3,12].includes(sum))return 'lose';if(mode.value==='easy'&&[2,3].includes(sum))return 'push';if(mode.value==='easy'&&sum===12)return 'lose';if(mode.value==='crapless'&&[2,3,12].includes(sum))return 'point';if([4,5,6,8,9,10].includes(sum))return 'point';return 'none'}
function pay(k,a,s){if(['4','5','6','8','9','10'].includes(k)&&Number(k)===s)return a*2;if(k==='num2'&&s===2)return a*31;if(k==='num3'&&s===3)return a*16;if(k==='num11'&&s===11)return a*16;if(k==='num12'&&s===12)return a*31; if(k==='field'&&[2,3,4,9,10,11,12].includes(s))return a*(s===2||s===12?3:2);if(k==='small'&&s>=4&&s<=10)return a*2;if(k==='tall'&&s>=2&&s<=6)return a*2;if(k==='all')return a*2;if(k==='hop7'&&s===7)return a*16;if(k==='anycraps'&&[2,3,12].includes(s))return a*8;
if(k==='pass'){if(!pointV){const c=passComeout(s); if(c==='win')return a*2; if(c==='lose')return 0; if(c==='push')return a; if(c==='point'){pointV=s;return null;}} if(pointV&&s===pointV){pointV=0;return a*2} if(pointV&&s===7){pointV=0;return 0} return null;}
if(k==='dont'){if(!pointV){if([2,3].includes(s))return a*2;if(s===12)return a;if([7,11].includes(s))return 0;pointV=s;return null;} if(pointV&&s===7){pointV=0;return a*2} if(pointV&&s===pointV){pointV=0;return 0} return null;}return 0}
roll.onclick=()=>{let c=0,t=2;const iv=setInterval(()=>{t=1+((Math.random()*6)|0)+1+((Math.random()*6)|0);dice.textContent=t;c++;if(c>8){clearInterval(iv);let w=0;for(const [k,a] of Object.entries(bets)){let r=pay(k,a,t);if(r!==null){w+=r;delete bets[k]}}add(w);if(w>0)celebrateWin(w>=50?'CRAPS HOT STREAK!':'CRAPS WIN!',w,'Dice paid out!');point.textContent=pointV||'OFF';log.innerHTML=`• Rolled ${t} ${w?`+${w.toFixed(2)} SpendTokens`:'no win'}<br>`+log.innerHTML;prev={...bets};h.unshift(t);h=h.slice(0,50);histItems.innerHTML=h.map(n=>`<span class='btn' style='padding:6px'>${n}</span>`).join('');renderBoard();setTokens(getTokens());beep(w?760:280,.12)}},80)};repeat.onclick=()=>{Object.entries(prev).forEach(([k,v])=>{if(spend(v))bets[k]=(bets[k]||0)+v});renderBoard();roll.click()};clear.onclick=()=>{Object.values(bets).forEach(add);bets={};renderBoard();setTokens(getTokens())};histBtn.onclick=()=>hist.classList.toggle('open');renderBoard();</script><div class='gate' id='gate'><div class='box'><h2>Craps</h2><p>Choose mode (Craps/Easy/Crapless), place token chips on the table numbers or fields, then roll.</p><button class='btn' id='startBtn'>Start Game</button></div></div><script>document.getElementById('startBtn').onclick=()=>document.getElementById('gate').style.display='none';</script></body></html>
