<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Magic Draw</title><link rel='stylesheet' href='common.css'><style>canvas{width:100%;height:70vh;background:#080b18;border:1px solid #345;border-radius:12px;touch-action:none}</style></head><body><div class='wrap'><div class='notice'>Magic Draw is for play/testing only.</div><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel'><h2>Magic Drawing Screen</h2><p class='notice'>Swipe or draw with mouse/finger to create neon streaks that fade over ~10 seconds.</p><canvas id='c' width='1000' height='700'></canvas></div></div><script src='common.js'></script><script>initWallet();const c=document.getElementById('c'),x=c.getContext('2d');let trails=[],down=false;function pos(e){const r=c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return {x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}};function addPt(p){trails.push({x:p.x,y:p.y,t:Date.now(),h:Math.random()*360});beep(300+Math.random()*250,.02)}
['pointerdown','touchstart'].forEach(ev=>c.addEventListener(ev,e=>{down=true;addPt(pos(e))}));['pointermove','touchmove'].forEach(ev=>c.addEventListener(ev,e=>{if(!down)return;addPt(pos(e));e.preventDefault()},{passive:false}));['pointerup','pointerleave','touchend','touchcancel'].forEach(ev=>c.addEventListener(ev,()=>down=false));
function draw(){x.fillStyle='rgba(8,11,24,0.18)';x.fillRect(0,0,c.width,c.height);const now=Date.now();trails=trails.filter(p=>now-p.t<10000);for(let i=1;i<trails.length;i++){const a=trails[i-1],b=trails[i],age=(now-b.t)/10000,al=1-age;if(al<=0)continue;x.strokeStyle=`hsla(${b.h},100%,60%,${al})`;x.lineWidth=6*(1-age)+1;x.shadowColor=`hsla(${b.h},100%,60%,${al})`;x.shadowBlur=12;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();}requestAnimationFrame(draw)}draw();</script></body></html>
