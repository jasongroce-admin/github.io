<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Poker</title><link rel='stylesheet' href='common.css'><style>.table{border-radius:12px;padding:10px}.theme-green{background:#0b5e35}.theme-west{background:#6b4423}.theme-neon{background:#2b125b}.cards{display:flex;gap:6px;flex-wrap:wrap}.card{width:64px;height:90px;border-radius:8px;background:#fff;color:#111;display:grid;place-items:center;font-weight:800}.hold{outline:3px solid #ffd166}.west{background:#7c5230;color:#f7e7c8}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel table theme-green' id='table'><h2>Poker Section</h2><div style='display:flex;gap:8px;flex-wrap:wrap'><label>Theme <select id='theme'><option value='green'>Classic Green</option><option value='west'>Old West (stained felt)</option><option value='neon'>Neon Lounge</option></select></label><label>Poker Type <select id='ptype'><option>Jacks or Better</option><option>Deuces Wild</option><option>Bonus Poker</option><option>Double Bonus</option></select></label></div><div class='cards' id='cards'></div><div style='margin-top:8px'><button class='btn' id='betBtn'>Bet Chip</button><button class='btn' id='deal'>Deal</button><button class='btn' id='draw'>Draw</button><button class='btn' id='undo'>Undo Bet</button></div><div id='status' class='token'>Place bet and deal.</div></div><div class='token-rail' id='rail'></div></div><script src='common.js'></script><script>initWallet();const vals=[1,5,10,25,50,100,250,500],colors=['#fff','#66f','#0cf','#ff9','#f96','#f33','#f0f','#fc3'];let pick=10,bet=0,stack=[];vals.forEach((v,i)=>{let b=document.createElement('button');b.className='chip-btn';b.style.background=colors[i];b.textContent=v;b.onclick=()=>pick=v;rail.appendChild(b)});const suits=['♠','♥','♦','♣'],r=['A','K','Q','J','10','9','8','7','6','5','4','3','2'];let deck=[],hand=[];function fresh(){deck=[];for(const s of suits)for(const n of r)deck.push({n,s});deck.sort(()=>Math.random()-.5)}function drawOne(){if(!deck.length)fresh();return deck.pop()}function render(){cards.innerHTML='';hand.forEach((c)=>{let d=document.createElement('div');d.className='card'+(c.h?' hold':'')+((theme.value==='west')?' west':'');d.textContent=c.n+c.s;d.onclick=()=>{c.h=!c.h;render()};cards.appendChild(d)});}function score(){const counts={};hand.forEach(c=>counts[c.n]=(counts[c.n]||0)+1);const vals=Object.values(counts).sort((a,b)=>b-a).join(',');if(vals==='4,1')return 25;if(vals==='3,2')return 9;if(vals==='3,1,1')return 3;if(vals==='2,2,1')return 2;if(vals==='2,1,1,1')return 1;return 0}function typeBoost(base){if(ptype.value==='Jacks or Better')return base;if(ptype.value==='Deuces Wild')return base*1.2;if(ptype.value==='Bonus Poker')return base*1.35;if(ptype.value==='Double Bonus')return base*1.55;return base}
function place(){if(!spend(pick))return;bet+=pick;stack.push(pick);status.textContent=`Bet ${bet.toFixed(2)}`;}betBtn.onclick=place;
deal.onclick=()=>{if(!bet)place();fresh();hand=[drawOne(),drawOne(),drawOne(),drawOne(),drawOne()].map(c=>({...c,h:false}));render();status.textContent='Tap cards to HOLD, then Draw.'};draw.onclick=()=>{hand=hand.map(c=>c.h?c:{...drawOne(),h:false});render();const m=typeBoost(score()),win=bet*m;add(win);if(win>0)celebrateWin(win>=100?'POKER JACKPOT!':'POKER WIN!',win,ptype.value);status.textContent=win?`Paid ${win.toFixed(2)} (x${m.toFixed(2)})`:'No made hand';bet=0;stack=[]};undo.onclick=()=>{const a=stack.pop();if(!a)return;bet-=a;add(a);status.textContent=`Bet ${bet.toFixed(2)}`};theme.onchange=()=>table.className='panel table '+(theme.value==='west'?'theme-west':theme.value==='neon'?'theme-neon':'theme-green');theme.onchange();</script><div class='gate' id='gate'><div class='box'><h2>Poker How-To</h2><p>Choose Poker Type + Theme, place chip bets, press Deal, tap cards to hold, then Draw. Different poker types change payout multipliers.</p><button class='btn' id='startBtn'>Start Poker</button></div></div><script>startBtn.onclick=()=>gate.style.display='none';</script></body></html>
