<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Token Poker</title><link rel='stylesheet' href='common.css'><style>.table{border-radius:12px;padding:10px;background:#0b5e35;position:relative}.cards{display:flex;gap:6px;flex-wrap:wrap}.card{width:64px;height:90px;border-radius:8px;background:#fff;color:#111;display:grid;place-items:center;font-weight:800}.back{background:#1e3a8a;color:#93c5fd}.hold{outline:3px solid #ffd166}.pot{width:130px;height:130px;border-radius:65px;background:radial-gradient(circle,#0c3f22,#072715);border:2px solid #d4af37;display:grid;place-items:center;cursor:pointer;position:relative}.stack{position:absolute;bottom:24px;display:grid;place-items:center}.stack .chip{width:58px;height:16px;border-radius:16px;background:#ef4444;border:2px solid #fff}.stack .chip:nth-child(2){transform:translateY(-6px)}.stack .chip:nth-child(3){transform:translateY(-12px)}.potTotal{position:absolute;top:8px;color:#fff;font-weight:900;text-shadow:0 0 6px #000}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='index.html'>← Arcade Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel table' id='table'><h2>Poker Table</h2><div class='row'><label>Theme <select id='theme'><option value='green'>Classic Green</option><option value='west'>Old West</option><option value='neon'>Neon Lounge</option></select></label><label>Poker Type <select id='ptype'><option>Jacks or Better</option><option>Deuces Wild</option><option>Bonus Poker</option><option>Double Bonus</option></select></label><label>Chip <select id='chipPick'></select></label></div><div class='row' style='margin-top:8px'><div><b>Dealer</b><div class='cards' id='dealer'></div></div><div class='pot' id='pot'><div class='potTotal' id='potTotal'>0</div><div class='stack'><div class='chip'></div><div class='chip'></div><div class='chip'></div></div></div><div><b>Player</b><div class='cards' id='cards'></div></div></div><div style='margin-top:8px'><button class='btn' id='deal'>Deal</button><button class='btn' id='draw'>Draw</button><button class='btn' id='undo'>Undo Pot Chip</button></div><div id='status' class='token'>Click pot to add selected chips.</div></div></div><script src='common.js'></script><script>initWallet();const vals=[1,5,10,25,50,100,250,500];chipPick.innerHTML=vals.map(v=>`<option>${v}</option>`).join('');let potAmt=0,stack=[],deck=[],hand=[],dhand=[];const suits=['♠','♥','♦','♣'],r=['A','K','Q','J','10','9','8','7','6','5','4','3','2'];function fresh(){deck=[];for(const s of suits)for(const n of r)deck.push({n,s});deck.sort(()=>Math.random()-.5)}function drawOne(){if(!deck.length)fresh();return deck.pop()}function renderCards(reveal=false){cards.innerHTML='';hand.forEach(c=>{let d=document.createElement('div');d.className='card'+(c.h?' hold':'');d.textContent=c.n+c.s;d.onclick=()=>{c.h=!c.h;renderCards(reveal)};cards.appendChild(d)});dealer.innerHTML='';dhand.forEach((c,i)=>{let d=document.createElement('div');d.className='card '+((reveal||i===0)?'':'back');d.textContent=(reveal||i===0)?c.n+c.s:'🂠';dealer.appendChild(d)});potTotal.textContent=potAmt.toFixed(0);}function placePot(){const v=+chipPick.value;if(!spend(v))return;potAmt+=v;stack.push(v);renderCards(false);status.textContent=`Pot ${potAmt.toFixed(2)}`;}pot.onclick=placePot;undo.onclick=()=>{const a=stack.pop();if(!a)return;potAmt-=a;add(a);renderCards(false);status.textContent=`Pot ${potAmt.toFixed(2)}`};function score(h){const counts={};h.forEach(c=>counts[c.n]=(counts[c.n]||0)+1);const vals=Object.values(counts).sort((a,b)=>b-a).join(',');if(vals==='4,1')return 25;if(vals==='3,2')return 9;if(vals==='3,1,1')return 3;if(vals==='2,2,1')return 2;if(vals==='2,1,1,1')return 1;return 0}function typeBoost(base){return ptype.value==='Deuces Wild'?base*1.2:ptype.value==='Bonus Poker'?base*1.35:ptype.value==='Double Bonus'?base*1.55:base}
deal.onclick=()=>{if(!potAmt)placePot();fresh();hand=[drawOne(),drawOne(),drawOne(),drawOne(),drawOne()].map(c=>({...c,h:false}));dhand=[drawOne(),drawOne(),drawOne(),drawOne(),drawOne()];renderCards(false);status.textContent='Tap player cards to hold, then Draw to reveal dealer.'};draw.onclick=()=>{hand=hand.map(c=>c.h?c:{...drawOne(),h:false});const pm=typeBoost(score(hand)),dm=score(dhand),win=Math.max(0,potAmt*pm - potAmt*dm*0.25);add(win);renderCards(true);if(win>0)celebrateWin(win>=100?'POKER JACKPOT!':'POKER WIN!',win,ptype.value);status.textContent=win?`Player wins ${win.toFixed(2)} with ${ptype.value}`:'Dealer edge this round';potAmt=0;stack=[];setTimeout(()=>renderCards(false),1800)};theme.onchange=()=>table.style.background=theme.value==='west'?'#6b4423':theme.value==='neon'?'#2b125b':'#0b5e35';theme.onchange();</script><div class='gate' id='gate'><div class='box'><h2>Poker How-To</h2><p>Select chip, tap the pot to stack bets, Deal, hold cards, then Draw. Dealer cards reveal on draw.</p><button class='btn' id='startBtn'>Start Poker</button></div></div><script>startBtn.onclick=()=>gate.style.display='none';</script></body></html>
