<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Keno neon</title><link rel='stylesheet' href='common.css'><style>.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}.n{padding:8px;border:1px solid #89a;border-radius:6px;text-align:center;cursor:pointer}.n.on{background:#ffd166;color:#111}.n.hit{background:#3ee67d;color:#111}</style></head><body><div class='wrap'><div class='top'><a class='btn' href='keno.html'>← Keno Menu</a><div>SpendTokens: <span id='tokenTotal' class='token'></span></div><button id='soundBtn' class='btn' onclick='toggleSound()'>Sound</button></div><div class='panel'><h2>Keno Neon</h2><div id='grid' class='grid'></div><div style='margin-top:8px'><button class='btn' id='draw'>Draw 20</button></div><div id='status' class='token'>Pick up to 10 numbers.</div></div></div><script src='common.js'></script><script>initWallet();const picks=new Set();for(let i=1;i<=80;i++){let d=document.createElement('button');d.className='n';d.textContent=i;d.onclick=()=>{if(d.classList.contains('on')){d.classList.remove('on');picks.delete(i);}else if(picks.size<10){d.classList.add('on');picks.add(i);}};grid.appendChild(d)}draw.onclick=()=>{const nums=[...Array(80)].map((_,i)=>i+1).sort(()=>Math.random()-.5).slice(0,20);let hit=0;[...grid.children].forEach((d,idx)=>{const n=idx+1;d.classList.remove('hit');if(nums.includes(n)&&picks.has(n)){hit++;d.classList.add('hit')}});const win=hit*5;add(win);if(win>0)celebrateWin('KENO WIN!',win,'Theme: Neon');status.textContent='Hits '+hit+' / '+picks.size+(win?' | Win '+win.toFixed(2):' | No win');};</script></body></html>
